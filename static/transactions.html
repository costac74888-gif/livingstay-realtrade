<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>실거래목록 — 홈앤스테이</title>
<meta name="description" content="전국 생활숙박시설·분양형호텔·콘도 실거래가 전체 목록. 지역·용도·기간별 검색." />
<link rel="icon" href="/static/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png" />
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css" />
</head>
<body>

<header id="siteHeader"></header>

<div class="tx-page">
  <div style="margin:16px 0 6px;">
    <a href="/" style="font-size:13px; color:var(--ink-soft); text-decoration:none;">← 지도 홈으로</a>
  </div>

  <div class="tx-filter">
    <div class="tx-filter-grid">
      <div class="field">
        <label>시/도</label>
        <select id="selSiDo"><option value="">전체</option></select>
      </div>
      <div class="field">
        <label>시/군/구</label>
        <select id="selSggNm"><option value="">전체</option></select>
      </div>
      <div class="field">
        <label>읍/면/동</label>
        <select id="selUmdNm"><option value="">전체</option></select>
      </div>
      <div class="field">
        <label>건물명 / 주소 검색</label>
        <input type="text" id="inputQ" placeholder="예) 오션마크레지던스" />
      </div>
      <div class="field">
        <label>용도</label>
        <select id="selLodgingType">
          <option value="" selected>전체(생숙+호텔+콘도+복합)</option>
          <option value="생활">생숙</option>
          <option value="호텔">호텔</option>
          <option value="콘도">콘도</option>
          <option value="복합">복합(예: 호텔·콘도)</option>
        </select>
      </div>
      <div class="field">
        <label>검색기간</label>
        <select id="selYear"></select>
      </div>
      <button class="btn-search" id="btnSearch">검색</button>
    </div>
  </div>

  <div class="results-head" style="margin-top:18px;">
    <h2>실거래 목록<span class="count" id="resultCount"></span></h2>
  </div>
  <div id="board"><div class="loading">불러오는 중…</div></div>
  <div class="pager" id="pager"></div>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-col">
      <div class="footer-logo-text">HOME &amp; STAY</div>
      <p class="footer-desc">전국 생활숙박시설 실거래가 조회 서비스</p>
    </div>
    <div class="footer-col footer-meta">
      <p>데이터 출처 · 국토교통부 실거래가 공개시스템(매매만 제공), 건축물대장</p>
      <p>실거래가 정보는 참고용이며, 실제 거래 시 반드시 원문 자료를 확인하시기 바랍니다.</p>
      <p class="footer-copy">© 2026 홈앤스테이 (HOME &amp; STAY). All rights reserved.</p>
    </div>
  </div>
</footer>

<style>
  .tx-page{ max-width:1240px; margin:0 auto 60px; padding:0 20px; }
  .tx-filter{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px 18px; }
  .tx-filter-grid{ display:grid; grid-template-columns:repeat(6, 1fr) auto; gap:12px; align-items:end; }
  .tx-filter-grid .field{ display:flex; flex-direction:column; gap:5px; min-width:0; }
  .tx-filter-grid .field label{ font-size:11.5px; color:var(--ink-soft); font-weight:600; }
  .tx-filter-grid .field select,
  .tx-filter-grid .field input{
    width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px;
    font-size:13px; font-family:inherit; box-sizing:border-box; background:#fff; color:var(--ink);
  }
  .tx-filter-grid .btn-search{
    background:var(--brass); color:#fff; border:none; border-radius:8px;
    padding:10px 22px; font-size:13.5px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap;
  }
  .tx-filter-grid .btn-search:hover{ background:var(--brass-dark); }
  @media (max-width: 900px){
    .tx-filter-grid{ grid-template-columns:1fr 1fr; }
    .tx-filter-grid .btn-search{ grid-column:1 / -1; }
  }
</style>

<script>
  let regionTree = {};
  const state = { si_do:"", sgg_nm:"", umd_nm:"", q:"", year:"all", lodging_type:"", page:1, size:20 };

  function escapeHtml(v){
    return String(v == null ? "" : v).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  async function loadRegions(){
    const res = await fetch("/api/regions");
    regionTree = await res.json();
    const selSiDo = document.getElementById("selSiDo");
    selSiDo.innerHTML = '<option value="">전체</option>' +
      Object.keys(regionTree).sort().map(sd => `<option value="${escapeHtml(sd)}">${escapeHtml(sd)} (${regionTree[sd].count})</option>`).join("");
  }
  function refreshSggOptions(){
    const selSggNm = document.getElementById("selSggNm");
    const selUmdNm = document.getElementById("selUmdNm");
    if (!state.si_do || !regionTree[state.si_do]){
      selSggNm.innerHTML = '<option value="">전체</option>';
      selUmdNm.innerHTML = '<option value="">전체</option>';
      return;
    }
    const sggMap = regionTree[state.si_do].sgg;
    selSggNm.innerHTML = '<option value="">전체</option>' +
      Object.keys(sggMap).sort().map(sg => `<option value="${escapeHtml(sg)}">${escapeHtml(sg)} (${sggMap[sg].count})</option>`).join("");
    selUmdNm.innerHTML = '<option value="">전체</option>';
  }
  function refreshUmdOptions(){
    const selUmdNm = document.getElementById("selUmdNm");
    const sgg = regionTree[state.si_do] && regionTree[state.si_do].sgg[state.sgg_nm];
    if (!sgg){
      selUmdNm.innerHTML = '<option value="">전체</option>';
      return;
    }
    const umdMap = sgg.umd;
    selUmdNm.innerHTML = '<option value="">전체</option>' +
      Object.keys(umdMap).sort().map(um => `<option value="${escapeHtml(um)}">${escapeHtml(um)} (${umdMap[um]})</option>`).join("");
  }

  async function loadYears(){
    const res = await fetch("/api/years");
    const data = await res.json();
    const sel = document.getElementById("selYear");
    const opts = ['<option value="all">전체 기간</option>'];
    data.years.forEach(y => opts.push(`<option value="${y}">${y}년</option>`));
    sel.innerHTML = opts.join("");
    sel.value = "all";
    state.year = "all";
  }

  function rowHTML(t){
    const typeTag = t.deal_type === "직거래"
      ? `<span class="tag brk">직거래</span>`
      : `<span class="tag med">중개거래</span>`;
    const lodgingColors = { "생활": "med", "호텔": "brk", "콘도": "src" };
    const isCombined = (t.lodging_type || "").includes("·");
    const lodgingClass = isCombined ? "mixed" : (lodgingColors[t.lodging_type] || "unknown");
    const lodgingLabel = t.lodging_type || "미확인";
    const lodgingTag = `<span class="tag ${lodgingClass}">${escapeHtml(lodgingLabel)}</span>`;
    const priceFormatted = Number(t.price || 0).toLocaleString('ko-KR');
    return `
      <tr>
        <td class="col-name">${t.building_name != null ? escapeHtml(t.building_name) : "(건물명 미확인)"} ${lodgingTag}</td>
        <td class="col-addr">${escapeHtml(t.si_do||'')} ${escapeHtml(t.sgg_nm||'')} ${escapeHtml(t.umd_nm||'')} ${escapeHtml(t.jibun||'')}</td>
        <td class="col-num col-area">${Number(t.area).toFixed(1)} ㎡</td>
        <td class="col-num col-floor">${t.floor ? escapeHtml(t.floor) + '<span class="m-only">층</span>' : '-'}</td>
        <td class="col-price">${priceFormatted}<span class="m-only">만원</span></td>
        <td class="col-date">${escapeHtml(t.deal_date||'')}</td>
        <td class="col-type">${typeTag}</td>
      </tr>`;
  }

  async function loadBoard(){
    const board = document.getElementById("board");
    board.innerHTML = `<div class="loading">불러오는 중…</div>`;

    const params = new URLSearchParams({
      q: state.q, si_do: state.si_do, sgg_nm: state.sgg_nm, umd_nm: state.umd_nm,
      year: state.year, lodging_type: state.lodging_type, page: state.page, size: state.size
    });

    let items = [], total = 0;
    try {
      const res = await fetch(`/api/transactions?${params}`);
      const data = await res.json();
      items = data.items || []; total = data.total || 0;
    } catch (e) {
      board.innerHTML = `<div class="empty-state"><div class="big">목록을 불러오지 못했습니다</div>잠시 후 다시 시도해주세요.</div>`;
      document.getElementById("pager").innerHTML = "";
      return;
    }

    document.getElementById("resultCount").textContent = `총 ${total.toLocaleString('ko-KR')}건`;

    if (items.length === 0){
      board.innerHTML = `<div class="empty-state"><div class="big">일치하는 거래가 없습니다</div>검색 조건을 조정해보세요.</div>`;
      document.getElementById("pager").innerHTML = "";
      return;
    }

    board.innerHTML = `
      <table class="data-table">
        <thead><tr><th>건물명</th><th>주소</th><th>면적</th><th>층</th><th>거래금액 (만원)</th><th>계약일</th><th>거래유형</th></tr></thead>
        <tbody>${items.map(rowHTML).join("")}</tbody>
      </table>`;

    const totalPages = Math.max(Math.ceil(total / state.size), 1);
    const pager = document.getElementById("pager");
    pager.innerHTML = `
      <button ${state.page<=1?"disabled":""} id="prevPage">이전</button>
      <span class="cur">${state.page} / ${totalPages}</span>
      <button ${state.page>=totalPages?"disabled":""} id="nextPage">다음</button>`;
    const prev = document.getElementById("prevPage");
    const next = document.getElementById("nextPage");
    if (prev) prev.addEventListener("click", ()=>{ state.page--; loadBoard(); window.scrollTo({top:0, behavior:"smooth"}); });
    if (next) next.addEventListener("click", ()=>{ state.page++; loadBoard(); window.scrollTo({top:0, behavior:"smooth"}); });
  }

  document.getElementById("selSiDo").addEventListener("change", e=>{
    state.si_do = e.target.value; state.sgg_nm=""; state.umd_nm="";
    refreshSggOptions();
  });
  document.getElementById("selSggNm").addEventListener("change", e=>{
    state.sgg_nm = e.target.value; state.umd_nm="";
    refreshUmdOptions();
  });
  document.getElementById("selUmdNm").addEventListener("change", e=>{ state.umd_nm = e.target.value; });
  document.getElementById("selYear").addEventListener("change", e=>{ state.year = e.target.value; });
  document.getElementById("selLodgingType").addEventListener("change", e=>{ state.lodging_type = e.target.value; });

  function runSearch(){
    state.q = document.getElementById("inputQ").value.trim();
    state.page = 1;
    loadBoard();
  }
  document.getElementById("btnSearch").addEventListener("click", runSearch);
  document.getElementById("inputQ").addEventListener("keydown", e=>{ if (e.key === "Enter") runSearch(); });

  (async function init(){
    await loadRegions();
    await loadYears();
    loadBoard();
  })();
</script>
<script>window.PAGE_TITLE = "실거래목록";</script>
<script src="/static/js/header.js"></script>
<script src="/static/js/auth.js"></script>

</body>
</html>
