<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>홈스퀘어부동산 — 생숙 실거래 조회</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16202E;
    --ink-soft:#5B6572;
    --line:#DDE1E6;
    --bg:#F3F5F7;
    --card:#FFFFFF;
    --brass:#B4863F;
    --brass-dark:#8F6A2F;
    --brass-tint:#FBF3E7;
    --brick:#B3453A;
    --brick-tint:#FBEBE9;
    --radius:10px;
    --shadow: 0 1px 2px rgba(22,32,46,.05), 0 4px 14px rgba(22,32,46,.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Noto Sans KR',sans-serif; -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'JetBrains Mono',monospace;}

  header{
    background:#fff; border-bottom:1px solid var(--line);
    padding:14px 28px; display:flex; align-items:center; gap:16px;
    position:sticky; top:0; z-index:30;
  }
  .brand{display:flex; align-items:center; gap:10px; padding-right:16px; border-right:1px solid var(--line);}
  .brand-mark{width:34px; height:34px; flex:0 0 auto;}
  .brand-text{line-height:1.2;}
  .brand-text .name{font-weight:700; font-size:15px; color:var(--ink);}
  .brand-text .sub{font-size:11px; color:var(--ink-soft); letter-spacing:.02em;}
  .page-title{font-size:15px; font-weight:600; color:var(--ink-soft);}
  .header-right{margin-left:auto; font-size:12px; color:var(--ink-soft);}

  .search-panel{max-width:1240px; margin:20px auto 0; padding:0 20px;}
  .panel-card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:18px 20px;
  }
  .search-grid{display:grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr auto; gap:10px; align-items:end;}
  .field label{display:block; font-size:11.5px; font-weight:600; color:var(--ink-soft); margin-bottom:6px;}
  .field select, .field input[type=text]{
    width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px;
    font-size:13px; font-family:'Noto Sans KR',sans-serif; background:#fff; color:var(--ink);
  }
  .field select:focus, .field input:focus{outline:2px solid var(--brass-tint); border-color:var(--brass);}
  .btn-search{
    background:var(--ink); color:#fff; border:none; border-radius:8px;
    padding:9px 22px; font-weight:600; font-size:13.5px; cursor:pointer; white-space:nowrap;
  }
  .btn-search:hover{background:#000;}
  .search-row2{
    display:flex; align-items:center; gap:18px; margin-top:12px; padding-top:12px;
    border-top:1px solid var(--line); font-size:12.5px; color:var(--ink-soft);
  }
  .search-row2 label{display:flex; align-items:center; gap:6px; cursor:pointer;}

  .results-panel{max-width:1240px; margin:16px auto 60px; padding:0 20px;}
  .results-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:10px;}
  .results-head h2{font-size:16px; margin:0; font-weight:700;}
  .results-head .count{color:var(--ink-soft); font-size:12.5px; margin-left:8px; font-weight:400;}

  table.data-table{
    width:100%; border-collapse:collapse; background:var(--card);
    border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;
    box-shadow:var(--shadow);
  }
  table.data-table thead th{
    background:#F8F9FA; border-bottom:1px solid var(--line);
    font-size:11.5px; color:var(--ink-soft); font-weight:600;
    padding:10px 12px; text-align:left; white-space:nowrap;
  }
  table.data-table tbody td{padding:11px 12px; border-bottom:1px solid var(--line); font-size:13px; vertical-align:middle;}
  table.data-table tbody tr:last-child td{border-bottom:none;}
  table.data-table tbody tr:hover{background:#FAFBFC;}
  td.col-star{width:36px; text-align:center; cursor:pointer; font-size:16px; color:var(--line);}
  td.col-star.on{color:var(--brass);}
  td.col-name{font-weight:600;}
  td.col-addr{color:var(--ink-soft); font-size:12.5px;}
  td.col-num{font-family:'JetBrains Mono',monospace; text-align:right; white-space:nowrap;}
  td.col-price{font-family:'JetBrains Mono',monospace; font-weight:700; text-align:right; white-space:nowrap;}
  td.col-date{font-family:'JetBrains Mono',monospace; color:var(--ink-soft); white-space:nowrap;}
  .tag{display:inline-block; font-size:10.5px; font-weight:600; padding:2px 8px; border-radius:5px;}
  .tag.brk{background:var(--brick-tint); color:var(--brick);}
  .tag.med{background:var(--brass-tint); color:var(--brass-dark);}
  .tag.src{background:#EEF1F3; color:var(--ink-soft); margin-left:4px;}

  .empty-state, .loading{text-align:center; padding:50px 20px; color:var(--ink-soft); font-size:13px;
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);}
  .empty-state .big{font-weight:700; color:var(--ink); font-size:15px; margin-bottom:6px;}

  .pager{display:flex; justify-content:center; gap:8px; margin-top:16px;}
  .pager button{border:1px solid var(--line); background:#fff; border-radius:8px; padding:7px 14px; font-size:12.5px; cursor:pointer;}
  .pager button:disabled{opacity:.4; cursor:not-allowed;}
  .pager .cur{font-family:'JetBrains Mono',monospace; font-size:12.5px; align-self:center; color:var(--ink-soft);}

  @media (max-width: 980px){
    .search-grid{grid-template-columns:1fr 1fr;}
    .btn-search{grid-column:span 2;}
    table.data-table{font-size:12px;}
    td.col-addr{display:none;}
    .brand-text .sub{display:none;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="44" height="44" rx="10" fill="#16202E"/>
      <path d="M24 9 L40 22 H35 V37 H13 V22 H9 Z" fill="#B4863F"/>
      <path d="M18.5 25.5 L22.5 29.5 L30 21" stroke="#16202E" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="brand-text">
      <div class="name">홈스퀘어부동산</div>
      <div class="sub">HOME SQUARE</div>
    </div>
  </div>
  <div class="page-title">생활형숙박시설 실거래 조회</div>
  <div class="header-right" id="healthStatus"></div>
</header>

<div class="search-panel">
  <div class="panel-card">
    <div class="search-grid">
      <div class="field">
        <label>시/도</label>
        <select id="selSiDo"><option value="">전체</option></select>
      </div>
      <div class="field">
        <label>시/군/구</label>
        <select id="selSggNm"><option value="">전체</option></select>
      </div>
      <div class="field">
        <label>읍/면/동</label>
        <select id="selUmdNm"><option value="">전체</option></select>
      </div>
      <div class="field">
        <label>건물명 / 주소 검색</label>
        <input type="text" id="inputQ" placeholder="예) 오션마크레지던스" />
      </div>
      <div class="field">
        <label>검색기간</label>
        <select id="selYear"></select>
      </div>
      <button class="btn-search" id="btnSearch">검색</button>
    </div>
    <div class="search-row2">
      <label><input type="checkbox" id="chkFavOnly"> 관심단지만 보기</label>
      <span id="favCountLabel"></span>
    </div>
  </div>
</div>

<div class="results-panel">
  <div class="results-head">
    <h2>실거래 목록<span class="count" id="resultCount"></span></h2>
  </div>
  <div id="board"><div class="loading">불러오는 중…</div></div>
  <div class="pager" id="pager"></div>
</div>

<script>
const FAV_KEY = "livingstay_favorites";
let regionTree = {};
let state = { si_do:"", sgg_nm:"", umd_nm:"", q:"", year:"", page:1, size:20, favOnly:false };

function getFavorites(){
  try { return JSON.parse(localStorage.getItem(FAV_KEY) || "[]"); } catch(e){ return []; }
}
function favKey(item){ return `${item.building_name}|${item.address}`; }
function isFav(item){ return getFavorites().includes(favKey(item)); }
function toggleFav(item){
  let favs = getFavorites();
  const k = favKey(item);
  favs = favs.includes(k) ? favs.filter(x=>x!==k) : [...favs, k];
  localStorage.setItem(FAV_KEY, JSON.stringify(favs));
  updateFavCountLabel();
}
function updateFavCountLabel(){
  document.getElementById("favCountLabel").textContent = `저장된 관심단지 ${getFavorites().length}개`;
}

async function loadRegions(){
  const res = await fetch("/api/regions");
  regionTree = await res.json();
  const selSiDo = document.getElementById("selSiDo");
  selSiDo.innerHTML = '<option value="">전체</option>' +
    Object.keys(regionTree).sort().map(sd => `<option value="${sd}">${sd} (${regionTree[sd].count})</option>`).join("");
}
function refreshSggOptions(){
  const selSggNm = document.getElementById("selSggNm");
  const selUmdNm = document.getElementById("selUmdNm");
  if (!state.si_do || !regionTree[state.si_do]){
    selSggNm.innerHTML = '<option value="">전체</option>';
    selUmdNm.innerHTML = '<option value="">전체</option>';
    return;
  }
  const sggMap = regionTree[state.si_do].sgg;
  selSggNm.innerHTML = '<option value="">전체</option>' +
    Object.keys(sggMap).sort().map(sg => `<option value="${sg}">${sg} (${sggMap[sg].count})</option>`).join("");
  selUmdNm.innerHTML = '<option value="">전체</option>';
}
function refreshUmdOptions(){
  const selUmdNm = document.getElementById("selUmdNm");
  const sgg = regionTree[state.si_do]?.sgg?.[state.sgg_nm];
  if (!sgg){
    selUmdNm.innerHTML = '<option value="">전체</option>';
    return;
  }
  const umdMap = sgg.umd;
  selUmdNm.innerHTML = '<option value="">전체</option>' +
    Object.keys(umdMap).sort().map(um => `<option value="${um}">${um} (${umdMap[um]})</option>`).join("");
}

async function loadYears(){
  const res = await fetch("/api/years");
  const data = await res.json();
  const sel = document.getElementById("selYear");
  const opts = ['<option value="all">전체 기간</option>'];
  data.years.forEach(y => opts.push(`<option value="${y}">${y}년</option>`));
  sel.innerHTML = opts.join("");
  sel.value = data.years.includes(data.current_year) ? data.current_year : "all";
  state.year = sel.value;
}

function rowHTML(t){
  const fav = isFav(t);
  const typeTag = t.deal_type === "직거래" ? `<span class="tag brk">직거래</span>` : `<span class="tag med">중개거래</span>`;
  const srcTag = t.match_source === "buildinghub" ? `<span class="tag src">건축물대장 보완</span>` : "";
  return `
    <tr>
      <td class="col-star ${fav?'on':''}" onclick="handleStarClick(this)">${fav?'★':'☆'}</td>
      <td class="col-name">${t.building_name ?? "(건물명 미확인)"}</td>
      <td class="col-addr">${t.si_do||''} ${t.sgg_nm||''} ${t.umd_nm||''} ${t.jibun||''}</td>
      <td class="col-num">${Number(t.area).toFixed(1)} ㎡</td>
      <td class="col-price">${(t.price/10000).toFixed(2)} 억원</td>
      <td class="col-date">${t.deal_date}</td>
      <td>${typeTag}${srcTag}</td>
    </tr>`;
}

let lastItems = [];
function handleStarClick(td){
  const tr = td.parentElement;
  const idx = [...tr.parentElement.children].indexOf(tr);
  const item = lastItems[idx];
  if(!item) return;
  toggleFav(item);
  td.classList.toggle("on");
  td.textContent = td.classList.contains("on") ? "★" : "☆";
}

async function loadBoard(){
  const board = document.getElementById("board");
  board.innerHTML = `<div class="loading">불러오는 중…</div>`;

  let items = [], total = 0;

  if (state.favOnly){
    const favs = getFavorites();
    const res = await fetch(`/api/transactions?size=200&year=all`);
    const data = await res.json();
    items = data.items.filter(t => favs.includes(favKey(t)));
    total = items.length;
  } else {
    const params = new URLSearchParams({
      q: state.q, si_do: state.si_do, sgg_nm: state.sgg_nm, umd_nm: state.umd_nm,
      year: state.year, page: state.page, size: state.size
    });
    const res = await fetch(`/api/transactions?${params}`);
    const data = await res.json();
    items = data.items; total = data.total;
  }

  lastItems = items;
  document.getElementById("resultCount").textContent = `총 ${total}건`;

  if (items.length === 0){
    board.innerHTML = `<div class="empty-state"><div class="big">일치하는 거래가 없습니다</div>검색 조건을 조정해보세요.</div>`;
    document.getElementById("pager").innerHTML = "";
    return;
  }

  board.innerHTML = `
    <table class="data-table">
      <thead><tr><th></th><th>건물명</th><th>주소</th><th>면적</th><th>거래금액</th><th>계약일</th><th>거래유형</th></tr></thead>
      <tbody>${items.map(rowHTML).join("")}</tbody>
    </table>`;

  if (state.favOnly){
    document.getElementById("pager").innerHTML = "";
  } else {
    const totalPages = Math.max(Math.ceil(total / state.size), 1);
    const pager = document.getElementById("pager");
    pager.innerHTML = `
      <button ${state.page<=1?"disabled":""} id="prevPage">이전</button>
      <span class="cur">${state.page} / ${totalPages}</span>
      <button ${state.page>=totalPages?"disabled":""} id="nextPage">다음</button>`;
    document.getElementById("prevPage")?.addEventListener("click", ()=>{ state.page--; loadBoard(); });
    document.getElementById("nextPage")?.addEventListener("click", ()=>{ state.page++; loadBoard(); });
  }
}

document.getElementById("selSiDo").addEventListener("change", e=>{
  state.si_do = e.target.value; state.sgg_nm=""; state.umd_nm="";
  refreshSggOptions();
});
document.getElementById("selSggNm").addEventListener("change", e=>{
  state.sgg_nm = e.target.value; state.umd_nm="";
  refreshUmdOptions();
});
document.getElementById("selUmdNm").addEventListener("change", e=>{ state.umd_nm = e.target.value; });
document.getElementById("selYear").addEventListener("change", e=>{ state.year = e.target.value; });
document.getElementById("chkFavOnly").addEventListener("change", e=>{
  state.favOnly = e.target.checked; state.page = 1; loadBoard();
});
document.getElementById("btnSearch").addEventListener("click", ()=>{
  state.q = document.getElementById("inputQ").value.trim();
  state.page = 1;
  loadBoard();
});
document.getElementById("inputQ").addEventListener("keydown", e=>{
  if (e.key === "Enter") document.getElementById("btnSearch").click();
});

async function loadHealth(){
  try{
    const res = await fetch("/api/health");
    const h = await res.json();
    if (h.finished_at){
      document.getElementById("healthStatus").textContent = `최근 갱신: ${String(h.finished_at).slice(0,16).replace('T',' ')} · 누적 ${h.total_transactions ?? '-'}건`;
    }
  } catch(e){}
}

(async function init(){
  await loadRegions();
  await loadYears();
  updateFavCountLabel();
  loadHealth();
  loadBoard();
})();
</script>

</body>
</html>
