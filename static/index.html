<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>홈스퀘어부동산 — 생숙 실거래 조회</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16202E;
    --ink-soft:#5B6572;
    --line:#DDE1E6;
    --bg:#F3F5F7;
    --card:#FFFFFF;
    --brass:#B4863F;
    --brass-dark:#8F6A2F;
    --brass-tint:#FBF3E7;
    --brick:#B3453A;
    --brick-tint:#FBEBE9;
    --radius:10px;
    --shadow: 0 1px 2px rgba(22,32,46,.05), 0 4px 14px rgba(22,32,46,.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Noto Sans KR',sans-serif; -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'JetBrains Mono',monospace;}

  header{
    background:#fff; border-bottom:1px solid var(--line);
    padding:14px 28px; display:flex; align-items:center; gap:16px;
    position:sticky; top:0; z-index:30;
  }
  .brand{display:flex; align-items:center; gap:10px; padding-right:16px; border-right:1px solid var(--line);}
  .brand-mark-img{height:34px; width:auto; display:block;}
  .brand-text{line-height:1.2;}
  .brand-text .name{font-weight:700; font-size:15px; color:var(--ink);}
  .brand-text .sub{font-size:10.5px; color:var(--ink-soft); letter-spacing:.04em;}
  .page-title{font-size:15px; font-weight:600; color:var(--ink-soft);}
  .header-right{margin-left:auto; font-size:12px; color:var(--ink-soft);}

  .search-panel{max-width:1240px; margin:20px auto 0; padding:0 20px;}
  .panel-card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:18px 20px;
  }
  .search-grid{display:grid; grid-template-columns: 0.9fr 1fr 1fr 1fr 1.2fr 0.9fr auto; gap:10px; align-items:end;}
  .field label{display:block; font-size:11.5px; font-weight:600; color:var(--ink-soft); margin-bottom:6px;}
  .field select, .field input[type=text]{
    width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px;
    font-size:13px; font-family:'Noto Sans KR',sans-serif; background:#fff; color:var(--ink);
  }
  .field select:focus, .field input:focus{outline:2px solid var(--brass-tint); border-color:var(--brass);}
  .btn-search{
    background:var(--ink); color:#fff; border:none; border-radius:8px;
    padding:9px 22px; font-weight:600; font-size:13.5px; cursor:pointer; white-space:nowrap;
  }
  .btn-search:hover{background:#000;}
  .search-row2{
    display:flex; align-items:center; gap:14px; margin-top:12px; padding-top:12px;
    border-top:1px solid var(--line); font-size:12.5px; color:var(--ink-soft); flex-wrap:wrap;
  }
  .search-row2 label{display:flex; align-items:center; gap:6px; cursor:pointer;}
  .fav-chip{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--brass-tint); color:var(--brass-dark); border:1px solid #EAD9B8;
    border-radius:999px; padding:4px 10px 4px 12px; font-size:12px; font-weight:600;
  }
  .fav-chip .label{cursor:pointer;}
  .fav-chip.active{background:var(--brass); color:#fff; border-color:var(--brass-dark);}
  .fav-chip.active .x{color:rgba(255,255,255,.85);}
  .fav-chip .x{cursor:pointer; color:var(--ink-soft); font-weight:400; margin-left:2px;}
  .fav-chip .x:hover{color:var(--brick);}

  .results-panel{max-width:1240px; margin:16px auto 60px; padding:0 20px;}
  .results-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:10px;}
  .results-head h2{font-size:16px; margin:0; font-weight:700;}
  .results-head .count{color:var(--ink-soft); font-size:12.5px; margin-left:8px; font-weight:400;}

  table.data-table{
    width:100%; border-collapse:collapse; background:var(--card);
    border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;
    box-shadow:var(--shadow);
  }
  table.data-table thead th{
    background:#F8F9FA; border-bottom:1px solid var(--line);
    font-size:11.5px; color:var(--ink-soft); font-weight:600;
    padding:10px 12px; text-align:left; white-space:nowrap;
  }
  table.data-table tbody td{padding:11px 12px; border-bottom:1px solid var(--line); font-size:13px; vertical-align:middle;}
  table.data-table tbody tr:last-child td{border-bottom:none;}
  table.data-table tbody tr:hover{background:#FAFBFC;}
  td.col-star{width:36px; text-align:center; cursor:pointer; font-size:16px; color:var(--line);}
  td.col-star.on{color:var(--brass);}
  td.col-name{font-weight:600;}
  td.col-addr{color:var(--ink-soft); font-size:12.5px;}
  td.col-num{font-family:'JetBrains Mono',monospace; text-align:right; white-space:nowrap;}
  td.col-price{font-family:'JetBrains Mono',monospace; font-weight:700; text-align:right; white-space:nowrap;}
  td.col-date{font-family:'JetBrains Mono',monospace; color:var(--ink-soft); white-space:nowrap;}
  .tag{display:inline-block; font-size:10.5px; font-weight:600; padding:2px 8px; border-radius:5px;}
  .tag.brk{background:var(--brick-tint); color:var(--brick);}
  .tag.med{background:var(--brass-tint); color:var(--brass-dark);}
  .tag.src{background:#EEF1F3; color:var(--ink-soft); margin-left:4px;}
  .tag.unknown{background:#EAEAEA; color:#8A8F98; margin-left:4px;}
  .tag.mixed{background:#F3E8FB; color:#7A3FA0; margin-left:4px;}

  .empty-state, .loading{text-align:center; padding:50px 20px; color:var(--ink-soft); font-size:13px;
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);}
  .empty-state .big{font-weight:700; color:var(--ink); font-size:15px; margin-bottom:6px;}

  .pager{display:flex; justify-content:center; gap:8px; margin-top:16px;}
  .pager button{border:1px solid var(--line); background:#fff; border-radius:8px; padding:7px 14px; font-size:12.5px; cursor:pointer;}
  .pager button:disabled{opacity:.4; cursor:not-allowed;}
  .pager .cur{font-family:'JetBrains Mono',monospace; font-size:12.5px; align-self:center; color:var(--ink-soft);}

  @media (max-width: 980px){
    .search-grid{grid-template-columns:1fr 1fr;}
    .btn-search{grid-column:span 2;}
    table.data-table{font-size:12px;}
    td.col-addr{display:none;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <img class="brand-mark-img" src="/static/home_stay_logo.png" alt="HOME &amp; STAY">
    <div class="brand-text">
      <div class="name">홈앤스테이</div>
    </div>
  </div>
  <div class="page-title">전국숙박시설실거래가조회</div>
  <div class="header-right" id="healthStatus"></div>
</header>

<div class="search-panel">
  <div class="panel-card">
    <div class="search-grid">
      <div class="field">
        <label>시/도</label>
        <select id="selSiDo"><option value="">전체</option></select>
      </div>
      <div class="field">
        <label>시/군/구</label>
        <select id="selSggNm"><option value="">전체</option></select>
      </div>
      <div class="field">
        <label>읍/면/동</label>
        <select id="selUmdNm"><option value="">전체</option></select>
      </div>
      <div class="field">
        <label>건물명 / 주소 검색</label>
        <input type="text" id="inputQ" placeholder="예) 오션마크레지던스" />
      </div>
      <div class="field">
        <label>용도</label>
        <select id="selLodgingType">
          <option value="">전체(생숙+호텔+콘도+복합)</option>
          <option value="생활" selected>생숙</option>
          <option value="호텔">호텔</option>
          <option value="콘도">콘도</option>
          <option value="복합">복합(예: 호텔·콘도)</option>
        </select>
      </div>
      <div class="field">
        <label>검색기간</label>
        <select id="selYear"></select>
      </div>
      <button class="btn-search" id="btnSearch">검색</button>
    </div>
    <div class="search-row2">
      <label><input type="checkbox" id="chkFavOnly"> 관심단지만 보기</label>
      <span id="favCountLabel"></span>
      <div id="favChips" style="display:flex; gap:6px; flex-wrap:wrap;"></div>
      <button id="btnOpenSubmit" style="margin-left:auto; background:#fff; border:1px dashed var(--brass); color:var(--brass-dark); border-radius:8px; padding:6px 14px; font-size:12.5px; font-weight:600; cursor:pointer;">+ 내 건물 수정 요청</button>
    </div>
  </div>
</div>

<div id="submitModal" style="display:none; position:fixed; inset:0; background:rgba(22,32,46,.45); z-index:50; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:14px; padding:26px 28px; width:420px; max-width:90vw; box-shadow:0 20px 60px rgba(0,0,0,.25);">
    <h3 style="margin:0 0 6px; font-size:16px;">내 건물 추가·수정 요청</h3>
    <p style="margin:0 0 16px; font-size:12.5px; color:var(--ink-soft); line-height:1.6;">
      도로명주소를 입력하시면 건축물대장을 실시간 조회해서 용도를 확인합니다.
      아래 예상 용도는 참고용이며, <b>실제 등록되는 값은 반드시 건축물대장 재조회 결과만
      사용</b>합니다 (제출하신 값을 그대로 반영하지 않습니다).
    </p>
    <label style="font-size:12px; font-weight:600; display:block; margin-bottom:4px;">도로명주소 *</label>
    <input id="submitAddress" type="text" placeholder="예) 경기도 수원시 팔달구 매산로1가 24"
      style="width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:13px; margin-bottom:10px;" />
    <label style="font-size:12px; font-weight:600; display:block; margin-bottom:4px;">건물명 (선택 — 비워두면 건축물대장 명칭 사용)</label>
    <input id="submitNameHint" type="text" placeholder="예) 오션마크레지던스"
      style="width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:13px; margin-bottom:10px;" />
    <label style="font-size:12px; font-weight:600; display:block; margin-bottom:4px;">예상 용도 (선택, 참고용 — 최종 반영은 재검증 결과만 사용)</label>
    <select id="submitLodgingType" style="width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:13px; margin-bottom:14px;">
      <option value="">잘 모르겠음</option>
      <option value="생활">생활숙박시설</option>
      <option value="호텔">호텔(관광/일반숙박시설)</option>
      <option value="콘도">휴양콘도미니엄</option>
      <option value="복합">복합(여러 용도가 섞인 것 같음)</option>
    </select>
    <div id="submitResult" style="font-size:12.5px; margin-bottom:12px; display:none; padding:10px 12px; border-radius:8px;"></div>
    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <button id="btnCloseSubmit" style="background:#fff; border:1px solid var(--line); border-radius:8px; padding:8px 16px; font-size:13px; cursor:pointer;">닫기</button>
      <button id="btnSubmitBuilding" style="background:var(--ink); color:#fff; border:none; border-radius:8px; padding:8px 18px; font-size:13px; font-weight:600; cursor:pointer;">확인 요청</button>
    </div>
  </div>
</div>

<div id="correctionModal" style="display:none; position:fixed; inset:0; background:rgba(22,32,46,.45); z-index:50; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:14px; padding:26px 28px; width:420px; max-width:90vw; box-shadow:0 20px 60px rgba(0,0,0,.25);">
    <h3 style="margin:0 0 6px; font-size:16px;">용도 라벨 정정 요청</h3>
    <p style="margin:0 0 12px; font-size:12.5px; color:var(--ink-soft); line-height:1.6;">
      <b id="correctionBuildingName" style="color:var(--ink);"></b>의 용도 라벨이 잘못됐다고
      생각되면 알려주세요. 제안하신 내용을 그대로 반영하지 않고,
      <b>건축물대장을 그 자리에서 다시 조회</b>해서 실제로 확인된 결과만 반영합니다.
    </p>
    <label style="font-size:12px; font-weight:600; display:block; margin-bottom:4px;">현재 라벨</label>
    <div id="correctionCurrentLabel" style="font-size:13px; margin-bottom:10px; color:var(--ink-soft);"></div>
    <label style="font-size:12px; font-weight:600; display:block; margin-bottom:4px;">제안하는 용도</label>
    <select id="correctionSuggestedType" style="width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:13px; margin-bottom:10px;">
      <option value="생활">생활숙박시설</option>
      <option value="호텔">호텔(관광/일반숙박시설)</option>
      <option value="콘도">휴양콘도미니엄</option>
      <option value="복합">복합(여러 용도가 섞인 것 같음)</option>
    </select>
    <label style="font-size:12px; font-weight:600; display:block; margin-bottom:4px;">사유 (선택)</label>
    <input id="correctionNote" type="text" placeholder="예) 실제 분양 안내문에 생숙으로 명시되어 있음"
      style="width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:13px; margin-bottom:14px;" />
    <div id="correctionResult" style="font-size:12.5px; margin-bottom:12px; display:none; padding:10px 12px; border-radius:8px;"></div>
    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <button id="btnCloseCorrection" style="background:#fff; border:1px solid var(--line); border-radius:8px; padding:8px 16px; font-size:13px; cursor:pointer;">닫기</button>
      <button id="btnSubmitCorrection" style="background:var(--ink); color:#fff; border:none; border-radius:8px; padding:8px 18px; font-size:13px; font-weight:600; cursor:pointer;">재검증 요청</button>
    </div>
  </div>
</div>

<div class="results-panel">
  <div class="results-head">
    <h2>실거래 목록<span class="count" id="resultCount"></span></h2>
  </div>
  <div id="board"><div class="loading">불러오는 중…</div></div>
  <div class="pager" id="pager"></div>
</div>

<script>
const FAV_KEY = "livingstay_favorites";
// 관리자 모드: URL에 ?admin=1 을 붙이면 50개까지, 아니면 일반 사용자 5개 제한
// (아직 로그인/계정 시스템이 없어 임시로 URL 파라미터로 구분 — 나중에 계정 붙이면 서버 권한으로 교체 권장)
const IS_ADMIN = new URLSearchParams(location.search).get("admin") === "1";
const MAX_FAVORITES = IS_ADMIN ? 50 : 5;

let regionTree = {};
let state = { si_do:"", sgg_nm:"", umd_nm:"", q:"", year:"", lodging_type:"생활", page:1, size:20, favOnly:false, favKey:null };

function getFavorites(){
  try { return JSON.parse(localStorage.getItem(FAV_KEY) || "[]"); } catch(e){ return []; }
}
function favKey(item){ return `${item.building_name}|${item.address}`; }
function isFav(item){ return getFavorites().includes(favKey(item)); }
function toggleFav(item){
  let favs = getFavorites();
  const k = favKey(item);
  let clearedActiveFilter = false;
  if (favs.includes(k)){
    favs = favs.filter(x=>x!==k);
    if (state.favKey === k){ state.favKey = null; state.favOnly = false; clearedActiveFilter = true; }
  } else {
    if (favs.length >= MAX_FAVORITES){
      alert(`관심단지는 최대 ${MAX_FAVORITES}개까지 저장할 수 있습니다.`);
      return false;
    }
    favs = [...favs, k];
  }
  localStorage.setItem(FAV_KEY, JSON.stringify(favs));
  updateFavCountLabel();
  renderFavChips();
  if (clearedActiveFilter){ document.getElementById("chkFavOnly").checked = false; loadBoard(); }
  return true;
}
function removeFav(key){
  const favs = getFavorites().filter(x=>x!==key);
  localStorage.setItem(FAV_KEY, JSON.stringify(favs));
  if (state.favKey === key){ state.favKey = null; state.favOnly = false; }
  updateFavCountLabel();
  renderFavChips();
  loadBoard();
}
function updateFavCountLabel(){
  document.getElementById("favCountLabel").textContent =
    `저장된 관심단지 ${getFavorites().length}/${MAX_FAVORITES}개`;
}
function escapeHtml(v){
  return String(v ?? "").replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]
  ));
}

function renderFavChips(){
  const wrap = document.getElementById("favChips");
  const favs = getFavorites();
  wrap.innerHTML = "";
  favs.forEach(k => {
    const name = k.split("|")[0];
    const chip = document.createElement("span");
    chip.className = "fav-chip" + (state.favKey === k ? " active" : "");
    const label = document.createElement("span");
    label.className = "label";
    label.textContent = "★ " + name;
    label.title = "이 관심단지만 보기";
    label.addEventListener("click", () => filterToFav(k));
    chip.appendChild(label);
    const x = document.createElement("span");
    x.className = "x";
    x.textContent = "✕";
    x.addEventListener("click", (e) => { e.stopPropagation(); removeFav(k); });
    chip.appendChild(x);
    wrap.appendChild(chip);
  });
}

function filterToFav(key){
  if (state.favOnly && state.favKey === key){
    state.favOnly = false; state.favKey = null;
  } else {
    state.favOnly = true; state.favKey = key;
  }
  document.getElementById("chkFavOnly").checked = false;
  state.page = 1;
  renderFavChips();
  loadBoard();
}

async function loadRegions(){
  const res = await fetch("/api/regions");
  regionTree = await res.json();
  const selSiDo = document.getElementById("selSiDo");
  selSiDo.innerHTML = '<option value="">전체</option>' +
    Object.keys(regionTree).sort().map(sd => `<option value="${sd}">${sd} (${regionTree[sd].count})</option>`).join("");
}
function refreshSggOptions(){
  const selSggNm = document.getElementById("selSggNm");
  const selUmdNm = document.getElementById("selUmdNm");
  if (!state.si_do || !regionTree[state.si_do]){
    selSggNm.innerHTML = '<option value="">전체</option>';
    selUmdNm.innerHTML = '<option value="">전체</option>';
    return;
  }
  const sggMap = regionTree[state.si_do].sgg;
  selSggNm.innerHTML = '<option value="">전체</option>' +
    Object.keys(sggMap).sort().map(sg => `<option value="${sg}">${sg} (${sggMap[sg].count})</option>`).join("");
  selUmdNm.innerHTML = '<option value="">전체</option>';
}
function refreshUmdOptions(){
  const selUmdNm = document.getElementById("selUmdNm");
  const sgg = regionTree[state.si_do]?.sgg?.[state.sgg_nm];
  if (!sgg){
    selUmdNm.innerHTML = '<option value="">전체</option>';
    return;
  }
  const umdMap = sgg.umd;
  selUmdNm.innerHTML = '<option value="">전체</option>' +
    Object.keys(umdMap).sort().map(um => `<option value="${um}">${um} (${umdMap[um]})</option>`).join("");
}

async function loadYears(){
  const res = await fetch("/api/years");
  const data = await res.json();
  const sel = document.getElementById("selYear");
  const opts = ['<option value="all">전체 기간</option>'];
  data.years.forEach(y => opts.push(`<option value="${y}">${y}년</option>`));
  sel.innerHTML = opts.join("");
  sel.value = data.years.includes(data.current_year) ? data.current_year : "all";
  state.year = sel.value;
}

function rowHTML(t, idx){
  const fav = isFav(t);
  const typeTag = t.deal_type === "직거래" ? `<span class="tag brk">직거래</span>` : `<span class="tag med">중개거래</span>`;
  const lodgingColors = { "생활": "med", "호텔": "brk", "콘도": "src" };
  const isCombined = (t.lodging_type || "").includes("·");
  const lodgingClass = isCombined ? "mixed" : (lodgingColors[t.lodging_type] || "unknown");
  const lodgingLabel = t.lodging_type || "미확인";
  const lodgingTag = `<span class="tag ${lodgingClass}" style="cursor:pointer;"
      title="${(t.lodging_type_detail||'용도 미확인 — 건축물대장 재검증 필요').replace(/"/g,'&quot;')} (클릭하면 정정 요청)"
      onclick="openCorrectionModal(${idx})">${lodgingLabel} ✎</span>`;
  const priceFormatted = Number(t.price || 0).toLocaleString('ko-KR');
  return `
    <tr>
      <td class="col-star ${fav?'on':''}" onclick="handleStarClick(this)">${fav?'★':'☆'}</td>
      <td class="col-name">${t.building_name != null ? escapeHtml(t.building_name) : "(건물명 미확인)"} ${lodgingTag}</td>
      <td class="col-addr">${escapeHtml(t.si_do||'')} ${escapeHtml(t.sgg_nm||'')} ${escapeHtml(t.umd_nm||'')} ${escapeHtml(t.jibun||'')}</td>
      <td class="col-num">${Number(t.area).toFixed(1)} ㎡</td>
      <td class="col-num">${t.floor || '-'}</td>
      <td class="col-price">${priceFormatted}</td>
      <td class="col-date">${t.deal_date}</td>
      <td>${typeTag}</td>
    </tr>`;
}

let lastItems = [];
function handleStarClick(td){
  const tr = td.parentElement;
  const idx = [...tr.parentElement.children].indexOf(tr);
  const item = lastItems[idx];
  if(!item) return;
  const ok = toggleFav(item);
  if (ok === false) return;  // 상한 초과 시 표시 변경 안 함
  td.classList.toggle("on");
  td.textContent = td.classList.contains("on") ? "★" : "☆";
}

async function loadBoard(){
  const board = document.getElementById("board");
  board.innerHTML = `<div class="loading">불러오는 중…</div>`;

  let items = [], total = 0;

  if (state.favOnly){
    const favs = state.favKey ? [state.favKey] : getFavorites();
    if (favs.length === 0){
      items = []; total = 0;
    } else {
      const res = await fetch(`/api/favorites?keys=${encodeURIComponent(favs.join(","))}`);
      const data = await res.json();
      items = data.items; total = data.total;
    }
  } else {
    const params = new URLSearchParams({
      q: state.q, si_do: state.si_do, sgg_nm: state.sgg_nm, umd_nm: state.umd_nm,
      year: state.year, lodging_type: state.lodging_type, page: state.page, size: state.size
    });
    const res = await fetch(`/api/transactions?${params}`);
    const data = await res.json();
    items = data.items; total = data.total;
  }

  lastItems = items;
  document.getElementById("resultCount").textContent = `총 ${total}건`;

  if (items.length === 0){
    board.innerHTML = `<div class="empty-state"><div class="big">일치하는 거래가 없습니다</div>검색 조건을 조정해보세요.</div>`;
    document.getElementById("pager").innerHTML = "";
    return;
  }

  board.innerHTML = `
    <table class="data-table">
      <thead><tr><th></th><th>건물명</th><th>주소</th><th>면적</th><th>층</th><th>거래금액 (만원)</th><th>계약일</th><th>거래유형</th></tr></thead>
      <tbody>${items.map((t, idx) => rowHTML(t, idx)).join("")}</tbody>
    </table>`;

  if (state.favOnly){
    document.getElementById("pager").innerHTML = "";
  } else {
    const totalPages = Math.max(Math.ceil(total / state.size), 1);
    const pager = document.getElementById("pager");
    pager.innerHTML = `
      <button ${state.page<=1?"disabled":""} id="prevPage">이전</button>
      <span class="cur">${state.page} / ${totalPages}</span>
      <button ${state.page>=totalPages?"disabled":""} id="nextPage">다음</button>`;
    document.getElementById("prevPage")?.addEventListener("click", ()=>{ state.page--; loadBoard(); });
    document.getElementById("nextPage")?.addEventListener("click", ()=>{ state.page++; loadBoard(); });
  }
}

document.getElementById("selSiDo").addEventListener("change", e=>{
  state.si_do = e.target.value; state.sgg_nm=""; state.umd_nm="";
  refreshSggOptions();
});
document.getElementById("selSggNm").addEventListener("change", e=>{
  state.sgg_nm = e.target.value; state.umd_nm="";
  refreshUmdOptions();
});
document.getElementById("selUmdNm").addEventListener("change", e=>{ state.umd_nm = e.target.value; });
document.getElementById("selYear").addEventListener("change", e=>{ state.year = e.target.value; });
document.getElementById("selLodgingType").addEventListener("change", e=>{
  state.lodging_type = e.target.value; state.page = 1; loadBoard();
});
document.getElementById("chkFavOnly").addEventListener("change", e=>{
  state.favOnly = e.target.checked; state.favKey = null; state.page = 1;
  renderFavChips(); loadBoard();
});
document.getElementById("btnSearch").addEventListener("click", ()=>{
  state.q = document.getElementById("inputQ").value.trim();
  state.page = 1;
  loadBoard();
});
document.getElementById("inputQ").addEventListener("keydown", e=>{
  if (e.key === "Enter") document.getElementById("btnSearch").click();
});

async function loadHealth(){
  try{
    const res = await fetch("/api/health");
    const h = await res.json();
    if (h.finished_at){
      document.getElementById("healthStatus").textContent = `최근 갱신: ${String(h.finished_at).slice(0,16).replace('T',' ')} · 누적 ${h.rows_inserted ?? '-'}건`;
    }
  } catch(e){}
}

(async function init(){
  await loadRegions();
  await loadYears();
  updateFavCountLabel();
  renderFavChips();
  loadHealth();
  loadBoard();
})();

// ---------- 내 건물 추가 요청 ----------
const submitModal = document.getElementById("submitModal");
document.getElementById("btnOpenSubmit").addEventListener("click", () => {
  submitModal.style.display = "flex";
  document.getElementById("submitResult").style.display = "none";
});
document.getElementById("btnCloseSubmit").addEventListener("click", () => {
  submitModal.style.display = "none";
});
document.getElementById("btnSubmitBuilding").addEventListener("click", async () => {
  const road_address = document.getElementById("submitAddress").value.trim();
  const building_name_hint = document.getElementById("submitNameHint").value.trim();
  const suggested_lodging_type = document.getElementById("submitLodgingType").value;
  const resultBox = document.getElementById("submitResult");

  if (!road_address) {
    resultBox.style.display = "block";
    resultBox.style.background = "#FBEBE9";
    resultBox.style.color = "#B3453A";
    resultBox.textContent = "주소를 입력해주세요.";
    return;
  }

  resultBox.style.display = "block";
  resultBox.style.background = "#EEF1F3";
  resultBox.style.color = "var(--ink-soft)";
  resultBox.textContent = "건축물대장을 조회하고 있습니다…";

  try {
    const res = await fetch("/api/submit-building", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ road_address, building_name_hint, suggested_lodging_type }),
    });
    const data = await res.json();

    if (data.status === "verified") {
      resultBox.style.background = "#EAF4EE";
      resultBox.style.color = "#2F7D52";
      resultBox.textContent = "✓ " + data.message;
      loadRegions();
      loadBoard();
    } else {
      resultBox.style.background = "#FBEBE9";
      resultBox.style.color = "#B3453A";
      resultBox.textContent = "✕ " + data.message;
    }
  } catch (e) {
    resultBox.style.background = "#FBEBE9";
    resultBox.style.color = "#B3453A";
    resultBox.textContent = "요청 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.";
  }
});

// ---------- 용도 정정 요청 ----------
const correctionModal = document.getElementById("correctionModal");
let correctionTarget = null;

function openCorrectionModal(idx){
  const t = lastItems[idx];
  if (!t || !t.sgg_cd) {
    alert("이 항목은 대상 건물 정보가 부족해 정정 요청을 할 수 없습니다.");
    return;
  }
  correctionTarget = t;
  document.getElementById("correctionBuildingName").textContent = t.building_name || "(건물명 미확인)";
  document.getElementById("correctionCurrentLabel").textContent =
    (t.lodging_type || "미확인") + (t.lodging_type_detail ? ` — ${t.lodging_type_detail}` : "");
  document.getElementById("correctionNote").value = "";
  document.getElementById("correctionResult").style.display = "none";
  correctionModal.style.display = "flex";
}
document.getElementById("btnCloseCorrection").addEventListener("click", () => {
  correctionModal.style.display = "none";
});
document.getElementById("btnSubmitCorrection").addEventListener("click", async () => {
  if (!correctionTarget) return;
  const suggested_lodging_type = document.getElementById("correctionSuggestedType").value;
  const requester_note = document.getElementById("correctionNote").value.trim();
  const resultBox = document.getElementById("correctionResult");

  resultBox.style.display = "block";
  resultBox.style.background = "#EEF1F3";
  resultBox.style.color = "var(--ink-soft)";
  resultBox.textContent = "건축물대장을 다시 조회하고 있습니다…";

  try {
    const res = await fetch("/api/request-correction", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        sgg_cd: correctionTarget.sgg_cd,
        umd_nm: correctionTarget.umd_nm,
        jibun: correctionTarget.jibun,
        suggested_lodging_type,
        requester_note,
      }),
    });
    const data = await res.json();

    if (data.status === "verified") {
      resultBox.style.background = data.changed ? "#EAF4EE" : "#EEF1F3";
      resultBox.style.color = data.changed ? "#2F7D52" : "var(--ink-soft)";
      resultBox.textContent = (data.changed ? "✓ " : "ℹ ") + data.message;
      if (data.changed) { loadBoard(); }
    } else {
      resultBox.style.background = "#FBEBE9";
      resultBox.style.color = "#B3453A";
      resultBox.textContent = "✕ " + data.message;
    }
  } catch (e) {
    resultBox.style.background = "#FBEBE9";
    resultBox.style.color = "#B3453A";
    resultBox.textContent = "요청 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.";
  }
});
</script>
