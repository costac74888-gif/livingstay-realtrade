<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>관리자 · 홈앤스테이</title>
  <link rel="stylesheet" href="/static/css/main.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sb-brand">
        <span class="admin-sb-logo">HOME &amp; STAY</span>
        <span class="admin-sb-sub">관리자</span>
      </div>
      <nav class="admin-menu">
        <button class="admin-menu-item is-active" data-menu="stats">통계 대시보드</button>
        <button class="admin-menu-item" data-menu="buildings">건물마스터</button>
        <button class="admin-menu-item" data-menu="applications">신청승인</button>
        <button class="admin-menu-item is-disabled" disabled>회원·슬롯 <span class="admin-soon">준비 중</span></button>
        <button class="admin-menu-item" data-menu="listings">매물관리</button>
        <button class="admin-menu-item" data-menu="transactions">실거래관리</button>
        <button class="admin-menu-item" data-menu="notices">공지사항 관리</button>
        <button class="admin-menu-item" data-menu="requests">수정요청 이력</button>
        <button class="admin-menu-item is-disabled" disabled>마일리지 <span class="admin-soon">준비 중</span></button>
        <button class="admin-menu-item is-disabled" disabled>위탁운영사DB <span class="admin-soon">준비 중</span></button>
        <button class="admin-menu-item is-disabled" disabled>유료화 <span class="admin-soon">준비 중</span></button>
        <button class="admin-menu-item is-disabled" disabled>권한로그 <span class="admin-soon">준비 중</span></button>
      </nav>
      <div class="admin-sb-foot">
        <a href="/" class="admin-sb-link">← 사이트로</a>
        <button id="changePwBtn" class="admin-sb-link">비밀번호 변경</button>
        <button id="logoutBtn" class="admin-sb-link admin-logout">로그아웃</button>
      </div>
    </aside>

    <main class="admin-main">
      <div id="grid"></div>
    </main>
  </div>

  <div id="pwModal" class="admin-modal-overlay" hidden>
    <div class="admin-modal-card" role="dialog" aria-modal="true" aria-labelledby="pwModalTitle">
      <h2 id="pwModalTitle" class="admin-modal-title">비밀번호 변경</h2>
      <form id="pwForm" class="admin-login-form" autocomplete="off">
        <input id="pwCurrent" type="password" class="admin-input" placeholder="현재 비밀번호" autocomplete="current-password" required />
        <input id="pwNew" type="password" class="admin-input" placeholder="새 비밀번호 (8자 이상)" autocomplete="new-password" required />
        <input id="pwNew2" type="password" class="admin-input" placeholder="새 비밀번호 확인" autocomplete="new-password" required />
        <div class="admin-modal-actions">
          <button type="button" id="pwCancel" class="admin-btn">취소</button>
          <button type="submit" id="pwSubmit" class="admin-btn admin-btn-primary">변경</button>
        </div>
      </form>
      <div id="pwMsg" class="admin-login-msg" role="alert"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="/static/js/admin.js"></script>
  <script>
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      try {
        await fetch("/api/admin/logout", { method: "POST" });
      } catch (e) {}
      window.location.href = "/admin/login";
    });

    // 비밀번호 변경 모달
    const pwModal = document.getElementById("pwModal");
    const pwForm = document.getElementById("pwForm");
    const pwMsg = document.getElementById("pwMsg");
    const pwSubmit = document.getElementById("pwSubmit");

    function openPwModal() {
      pwForm.reset();
      pwMsg.textContent = "";
      pwModal.hidden = false;
    }
    function closePwModal() {
      pwModal.hidden = true;
    }

    document.getElementById("changePwBtn").addEventListener("click", openPwModal);
    document.getElementById("pwCancel").addEventListener("click", closePwModal);
    pwModal.addEventListener("click", (e) => {
      if (e.target === pwModal) closePwModal();
    });

    pwForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const current = document.getElementById("pwCurrent").value;
      const next = document.getElementById("pwNew").value;
      const next2 = document.getElementById("pwNew2").value;
      pwMsg.textContent = "";
      if (next.length < 8) {
        pwMsg.textContent = "새 비밀번호는 8자 이상이어야 합니다.";
        return;
      }
      if (next !== next2) {
        pwMsg.textContent = "새 비밀번호가 서로 일치하지 않습니다.";
        return;
      }
      pwSubmit.disabled = true;
      pwSubmit.textContent = "변경 중…";
      try {
        const res = await fetch("/api/admin/password", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ current_password: current, new_password: next }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok) {
          pwMsg.style.color = "";
          alert("비밀번호가 변경되었습니다. 다시 로그인해주세요.");
          window.location.href = "/admin/login";
          return;
        }
        pwMsg.textContent = data.message || "비밀번호 변경에 실패했습니다.";
      } catch (err) {
        pwMsg.textContent = "네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.";
      } finally {
        pwSubmit.disabled = false;
        pwSubmit.textContent = "변경";
      }
    });

    // 메뉴별 그리드 설정 — 같은 DataGrid에 컬럼 정의만 바꿔 그대로 재사용한다.
    const GRID_CONFIGS = {
      buildings: {
        endpoint: "/api/admin/buildings",
        exportUrl: "/api/admin/buildings/export.xlsx",
        title: "건물마스터",
        entityLabel: "건물",
        searchPlaceholder: "건물명·주소 검색",
        columns: [
          { key: "id", label: "ID", sortable: true },
          { key: "building_name", label: "건물명", sortable: true, editable: true, required: true },
          { key: "road_address", label: "도로명주소", sortable: true, editable: true, required: true },
          { key: "lodging_type", label: "용도", sortable: true, editable: true, type: "select", options: ["생활", "호텔", "콘도"] },
          { key: "units", label: "호실수", sortable: true, editable: true, type: "number" },
          { key: "biz_units", label: "영업신고호수", sortable: true, editable: true, type: "number" },
          { key: "sgg_text", label: "시군구", editable: true },
          { key: "umd_nm", label: "읍면동", editable: true },
          { key: "jibun", label: "지번", editable: true },
          { key: "sgg_cd", label: "법정동코드", editable: true, hideInTable: true },
          { key: "jibun_address", label: "지번주소", editable: true, hideInTable: true },
          { key: "lodging_type_detail", label: "용도상세", editable: true, hideInTable: true },
        ],
      },
      // 매물: 신규 추가는 이번엔 생략(C/D 승인 이후 흐름에서 생성) — 수정/삭제/정렬/검색/엑셀만.
      listings: {
        endpoint: "/api/admin/listings",
        exportUrl: "/api/admin/listings/export.xlsx",
        title: "매물관리",
        entityLabel: "매물",
        allowAdd: false,
        searchPlaceholder: "건물ID로 검색",
        columns: [
          { key: "id", label: "ID", sortable: true },
          { key: "building_name", label: "건물명" },
          { key: "deal_type", label: "거래유형", sortable: true, editable: true, type: "select", options: ["매매", "전세", "월세"] },
          { key: "price", label: "가격(만원)", sortable: true, editable: true, type: "number" },
          { key: "monthly_rent", label: "월세(만원)", editable: true, type: "number" },
          { key: "floor", label: "층", editable: true },
          { key: "area", label: "면적(㎡)", editable: true, type: "number" },
          { key: "status", label: "상태", sortable: true, editable: true, type: "select", options: ["active", "completed", "hidden"] },
          { key: "created_at", label: "등록일", sortable: true },
        ],
      },
      // 신청승인: C/D에서 들어온 중개사/운영업체 신청 큐. 승인 시 agents/operators로 INSERT.
      // 추가/수정/삭제 없음 — 대기중 행에서만 "승인"/"반려" 커스텀 액션.
      applications: {
        endpoint: "/api/admin/applications",
        exportUrl: "/api/admin/applications/export.xlsx",
        title: "신청 승인",
        entityLabel: "신청",
        allowAdd: false,
        allowEdit: false,
        allowDelete: false,
        searchPlaceholder: "업체명·대표자·이메일 검색",
        filters: [
          { key: "status", default: "submitted", options: [
            { value: "submitted", label: "대기중" },
            { value: "approved", label: "승인됨" },
            { value: "rejected", label: "반려됨" },
            { value: "all", label: "전체 상태" },
          ] },
          { key: "applicant_type", default: "all", options: [
            { value: "all", label: "전체 유형" },
            { value: "agent", label: "중개사" },
            { value: "operator", label: "지원업체" },
          ] },
        ],
        columns: [
          { key: "id", label: "ID", sortable: true },
          { key: "applicant_type", label: "신청유형", render: (v) => v === "agent" ? "중개사" : (v === "operator" ? "지원업체" : dgEscape(v)) },
          { key: "office_or_company_name", label: "이름/업체명" },
          { key: "owner_name", label: "대표자" },
          { key: "phone", label: "연락처" },
          { key: "email", label: "이메일" },
          { key: "preferred_region", label: "희망지역" },
          { key: "submitted_at", label: "신청일", sortable: true },
          { key: "status", label: "상태", render: (v) => {
            const m = { submitted: ["대기중", "wait"], approved: ["승인됨", "ok"], rejected: ["반려됨", "no"] };
            const x = m[v] || [v, ""];
            return `<span class="dg-badge dg-badge-${x[1]}">${dgEscape(x[0])}</span>`;
          } },
        ],
        rowActions: [
          {
            label: "승인", className: "dg-approve",
            hidden: (row) => row.status !== "submitted",
            onClick: async (row, grid) => {
              const name = row.office_or_company_name || "";
              if (!window.confirm(`'${name}' 신청을 승인할까요? 승인하면 정식 등록됩니다.`)) return;
              try {
                const res = await fetch(`${grid.cfg.endpoint}/${row.id}/approve`, { method: "POST" });
                if (res.status === 401) { window.location.href = "/admin/login"; return; }
                const data = await res.json().catch(() => ({}));
                if (res.ok && data.ok) { grid.reload(); return; }
                window.alert(data.message || "승인에 실패했습니다.");
              } catch (e) { window.alert("네트워크 오류가 발생했습니다."); }
            },
          },
          {
            label: "반려", className: "dg-reject",
            hidden: (row) => row.status !== "submitted",
            onClick: async (row, grid) => {
              const reason = await dgPromptModal({
                title: "신청 반려", label: "반려 사유",
                placeholder: "반려 사유를 입력하세요", submitLabel: "반려", submitClass: "admin-btn-danger",
              });
              if (reason == null) return;
              try {
                const res = await fetch(`${grid.cfg.endpoint}/${row.id}/reject`, {
                  method: "POST", headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ reason }),
                });
                if (res.status === 401) { window.location.href = "/admin/login"; return; }
                const data = await res.json().catch(() => ({}));
                if (res.ok && data.ok) { grid.reload(); return; }
                window.alert(data.message || "반려에 실패했습니다.");
              } catch (e) { window.alert("네트워크 오류가 발생했습니다."); }
            },
          },
        ],
      },
      // 수정요청 이력: submit_building()에서 건축물대장 재검증으로 자동 처리됨 → 읽기 전용 모니터링.
      requests: {
        endpoint: "/api/admin/building-requests",
        title: "수정요청 이력",
        allowAdd: false,
        allowEdit: false,
        allowDelete: false,
        searchPlaceholder: "주소·건물명 검색",
        columns: [
          { key: "id", label: "ID", sortable: true },
          { key: "request_type", label: "요청유형", render: (v) => v === "new" ? "신규 등록" : (v === "correction" ? "정정 요청" : dgEscape(v)) },
          { key: "road_address", label: "주소" },
          { key: "building_name_hint", label: "건물명" },
          { key: "status", label: "상태", sortable: true, render: (v) => {
            const m = { pending: ["대기중", "wait"], verified: ["확인됨", "ok"], rejected: ["거절됨", "no"] };
            const x = m[v] || [v, ""];
            return `<span class="dg-badge dg-badge-${x[1]}">${dgEscape(x[0])}</span>`;
          } },
          { key: "reject_reason", label: "거절사유" },
          { key: "processed_at", label: "처리일시", sortable: true },
        ],
      },
      // 실거래: 공공데이터 원본 — 삭제 없음, 이상치 정정만. 수정 시 사유(reason) 필수 → admin_edit_log 기록.
      transactions: {
        endpoint: "/api/admin/transactions",
        exportUrl: "/api/admin/transactions/export.xlsx",
        title: "실거래관리",
        entityLabel: "실거래",
        allowAdd: false,
        allowDelete: false,
        searchPlaceholder: "건물명·주소 검색",
        columns: [
          { key: "id", label: "ID", sortable: true },
          { key: "building_name", label: "건물명" },
          { key: "address", label: "주소" },
          { key: "area", label: "면적(㎡)", sortable: true, editable: true, type: "number" },
          { key: "floor", label: "층", editable: true },
          { key: "price", label: "거래금액(만원)", sortable: true, editable: true, type: "number" },
          { key: "deal_date", label: "계약일", sortable: true, editable: true },
          { key: "deal_type", label: "거래유형", editable: true },
          { key: "reason", label: "수정 사유", editable: true, required: true, hideInTable: true },
        ],
      },
      // 공지사항: 관리자가 직접 작성/수정/삭제. 기본 정렬은 서버에서 고정 우선 → 최신순.
      notices: {
        endpoint: "/api/admin/notices",
        title: "공지사항 관리",
        entityLabel: "공지",
        searchPlaceholder: "제목·본문 검색",
        columns: [
          { key: "id", label: "ID", sortable: true },
          { key: "title", label: "제목", sortable: true, editable: true, required: true },
          { key: "body", label: "본문", editable: true, required: true, type: "textarea", hideInTable: true },
          { key: "is_pinned", label: "고정", sortable: true, editable: true, type: "boolean", trueLabel: "고정", falseLabel: "일반",
            render: (v) => v ? `<span class="dg-badge dg-badge-ok">고정</span>` : "일반" },
          { key: "created_at", label: "등록일", sortable: true },
        ],
      },
    };

    const mount = document.getElementById("grid");
    let currentGrid = null;
    let statsCharts = [];

    function destroyStatsCharts() {
      statsCharts.forEach((c) => { try { c.destroy(); } catch (e) {} });
      statsCharts = [];
    }

    // 브랜드 컬러 팔레트 (GOLD/BLACK 계열)
    const BRAND = {
      brass: "#B4863F", brassSoft: "rgba(180,134,63,0.18)", ink: "#16202E",
      palette: ["#B4863F", "#16202E", "#C9A063", "#5A6B7B", "#8A6D3B", "#A9B4BF", "#D8C29A", "#3C4A5A", "#E0D2B4", "#7E8A96"],
    };

    async function showStats(menuKey) {
      destroyStatsCharts();
      mount.innerHTML = `<div class="stats-loading">통계를 불러오는 중…</div>`;
      let data;
      try {
        const res = await fetch("/api/admin/stats");
        if (res.status === 401) { window.location.href = "/admin/login"; return; }
        if (!res.ok) throw new Error("stats fetch failed");
        data = await res.json();
      } catch (e) {
        mount.innerHTML = `<div class="stats-loading">통계를 불러오지 못했습니다. 새로고침 해주세요.</div>`;
        return;
      }
      renderStats(data);
    }

    function num(n) { return (n || 0).toLocaleString("ko-KR"); }

    function renderStats(d) {
      const m = d.members || {};
      const ag = m.agent || { pending: 0, approved: 0, rejected: 0 };
      const op = m.operator || { pending: 0, approved: 0, rejected: 0 };
      const tx = (d.transactions && d.transactions.monthly) || [];
      const totalTx = tx.reduce((s, r) => s + (r.count || 0), 0);
      const totalBld = ((d.buildings && d.buildings.by_type) || []).reduce((s, r) => s + (r.count || 0), 0);
      const collectStart = (d.views && d.views.collect_start) || "-";

      mount.innerHTML = `
        <div class="stats-head">
          <h2 class="stats-title">통계 대시보드</h2>
          <p class="stats-sub">매출 통계는 결제기능 도입 후 제공됩니다.</p>
        </div>

        <div class="stats-kpi-row">
          <div class="stats-kpi"><span class="stats-kpi-label">등록 건물</span><span class="stats-kpi-val">${num(totalBld)}</span><span class="stats-kpi-unit">건</span></div>
          <div class="stats-kpi"><span class="stats-kpi-label">최근 12개월 거래</span><span class="stats-kpi-val">${num(totalTx)}</span><span class="stats-kpi-unit">건</span></div>
          <div class="stats-kpi"><span class="stats-kpi-label">승인 중개사</span><span class="stats-kpi-val">${num(ag.approved)}</span><span class="stats-kpi-unit">명</span></div>
          <div class="stats-kpi"><span class="stats-kpi-label">승인 운영업체</span><span class="stats-kpi-val">${num(op.approved)}</span><span class="stats-kpi-unit">곳</span></div>
        </div>

        <div class="stats-grid">
          <section class="stats-card stats-card-wide">
            <h3 class="stats-card-title">실거래 추이 <span class="stats-card-hint">최근 12개월 · 막대=거래건수, 선=거래금액(만원)</span></h3>
            <div class="stats-chart-box"><canvas id="chartTx"></canvas></div>
          </section>

          <section class="stats-card">
            <h3 class="stats-card-title">용도별 건물 분포</h3>
            <div class="stats-chart-box"><canvas id="chartType"></canvas></div>
          </section>

          <section class="stats-card">
            <h3 class="stats-card-title">시·도별 건물 TOP 10</h3>
            <div class="stats-chart-box"><canvas id="chartSido"></canvas></div>
          </section>

          <section class="stats-card stats-card-wide">
            <h3 class="stats-card-title">회원 상태별 현황</h3>
            <div class="stats-member-wrap">
              <div class="stats-member-group">
                <h4 class="stats-member-title">중개사</h4>
                <div class="stats-member-cards">
                  <div class="stats-mcard stats-mcard-wait"><span class="stats-mcard-num">${num(ag.pending)}</span><span class="stats-mcard-label">대기중</span></div>
                  <div class="stats-mcard stats-mcard-ok"><span class="stats-mcard-num">${num(ag.approved)}</span><span class="stats-mcard-label">승인됨</span></div>
                  <div class="stats-mcard stats-mcard-no"><span class="stats-mcard-num">${num(ag.rejected)}</span><span class="stats-mcard-label">반려됨</span></div>
                </div>
              </div>
              <div class="stats-member-group">
                <h4 class="stats-member-title">운영업체</h4>
                <div class="stats-member-cards">
                  <div class="stats-mcard stats-mcard-wait"><span class="stats-mcard-num">${num(op.pending)}</span><span class="stats-mcard-label">대기중</span></div>
                  <div class="stats-mcard stats-mcard-ok"><span class="stats-mcard-num">${num(op.approved)}</span><span class="stats-mcard-label">승인됨</span></div>
                  <div class="stats-mcard stats-mcard-no"><span class="stats-mcard-num">${num(op.rejected)}</span><span class="stats-mcard-label">반려됨</span></div>
                </div>
              </div>
            </div>
          </section>

          <section class="stats-card stats-card-wide">
            <h3 class="stats-card-title">일별 방문자 추이 <span class="stats-card-hint">데이터 수집 시작: ${dgEscape(collectStart)}부터 (이전 기록은 없습니다)</span></h3>
            <div class="stats-chart-box"><canvas id="chartViews"></canvas></div>
            <div id="statsTopPaths" class="stats-toppaths"></div>
          </section>
        </div>
      `;

      const commonOpts = { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: BRAND.ink } } } };

      // 실거래 추이 (막대+선 콤보)
      statsCharts.push(new Chart(document.getElementById("chartTx"), {
        data: {
          labels: tx.map((r) => r.month),
          datasets: [
            { type: "bar", label: "거래건수", data: tx.map((r) => r.count), backgroundColor: BRAND.brassSoft, borderColor: BRAND.brass, borderWidth: 1, yAxisID: "y", order: 2 },
            { type: "line", label: "거래금액(만원)", data: tx.map((r) => r.amount), borderColor: BRAND.ink, backgroundColor: BRAND.ink, tension: 0.3, yAxisID: "y1", order: 1 },
          ],
        },
        options: Object.assign({}, commonOpts, {
          scales: {
            y: { position: "left", beginAtZero: true, title: { display: true, text: "건수" }, ticks: { color: BRAND.ink } },
            y1: { position: "right", beginAtZero: true, title: { display: true, text: "금액(만원)" }, grid: { drawOnChartArea: false }, ticks: { color: BRAND.ink } },
            x: { ticks: { color: BRAND.ink } },
          },
        }),
      }));

      // 용도별 건물 분포 (도넛)
      const byType = (d.buildings && d.buildings.by_type) || [];
      statsCharts.push(new Chart(document.getElementById("chartType"), {
        type: "doughnut",
        data: {
          labels: byType.map((r) => r.lodging_type),
          datasets: [{ data: byType.map((r) => r.count), backgroundColor: BRAND.palette, borderColor: "#fff", borderWidth: 2 }],
        },
        options: Object.assign({}, commonOpts, { cutout: "58%" }),
      }));

      // 시도별 TOP10 (가로 막대)
      const bySido = (d.buildings && d.buildings.by_sido) || [];
      statsCharts.push(new Chart(document.getElementById("chartSido"), {
        type: "bar",
        data: {
          labels: bySido.map((r) => r.sido),
          datasets: [{ label: "건물 수", data: bySido.map((r) => r.count), backgroundColor: BRAND.brass }],
        },
        options: Object.assign({}, commonOpts, {
          indexAxis: "y",
          plugins: { legend: { display: false } },
          scales: { x: { beginAtZero: true, ticks: { color: BRAND.ink } }, y: { ticks: { color: BRAND.ink } } },
        }),
      }));

      // 일별 방문자 추이 (선)
      const daily = (d.views && d.views.daily) || [];
      statsCharts.push(new Chart(document.getElementById("chartViews"), {
        type: "line",
        data: {
          labels: daily.map((r) => r.day.slice(5)),
          datasets: [{ label: "일별 방문(페이지뷰)", data: daily.map((r) => r.count), borderColor: BRAND.brass, backgroundColor: BRAND.brassSoft, fill: true, tension: 0.3, pointRadius: 3 }],
        },
        options: Object.assign({}, commonOpts, {
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, ticks: { precision: 0, color: BRAND.ink } }, x: { ticks: { color: BRAND.ink } } },
        }),
      }));

      // 오늘 경로별 조회수 상위 5
      const top = (d.views && d.views.top_paths) || [];
      const topEl = document.getElementById("statsTopPaths");
      if (top.length) {
        topEl.innerHTML = `<div class="stats-toppaths-title">오늘 인기 경로 TOP 5</div>` +
          top.map((r) => `<div class="stats-toppath-row"><span class="stats-toppath-path">${dgEscape(r.path)}</span><span class="stats-toppath-cnt">${num(r.count)}회</span></div>`).join("");
      } else {
        topEl.innerHTML = `<div class="stats-toppaths-title">오늘 인기 경로 TOP 5</div><div class="stats-toppath-empty">아직 오늘 방문 기록이 없습니다.</div>`;
      }
    }

    function showGrid(menuKey) {
      const cfg = GRID_CONFIGS[menuKey];
      if (!cfg) return;
      destroyStatsCharts();
      currentGrid = new DataGrid(Object.assign({ mount: mount, idField: "id", pageSize: 50 }, cfg));
    }

    function showView(menuKey) {
      if (menuKey === "stats") { showStats(menuKey); return; }
      showGrid(menuKey);
    }

    document.querySelectorAll(".admin-menu-item[data-menu]").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".admin-menu-item").forEach((b) => b.classList.remove("is-active"));
        btn.classList.add("is-active");
        showView(btn.getAttribute("data-menu"));
      });
    });

    showView("stats");
  </script>
</body>
</html>
