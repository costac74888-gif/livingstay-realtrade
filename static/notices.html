<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>공지사항 — 홈앤스테이</title>
<meta name="description" content="홈앤스테이 공지사항." />
<link rel="icon" href="/static/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png" />
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css" />
</head>
<body>

<header id="siteHeader"></header>

<div class="search-panel" style="max-width:640px; padding-bottom:40px;">
  <div style="margin:16px 0 6px;">
    <a href="/" style="font-size:13px; color:var(--ink-soft); text-decoration:none;">← 홈으로</a>
  </div>

  <div class="panel-card">
    <h1 style="font-size:20px; font-weight:700; color:var(--ink); margin:0 0 16px;">공지사항</h1>
    <div id="noticeList">
      <div style="text-align:center; padding:48px 12px; color:var(--ink-soft); font-size:14px;">불러오는 중…</div>
    </div>
  </div>
</div>

<style>
  .notice-item { border-bottom:1px solid var(--line, #e8eaed); }
  .notice-item:last-child { border-bottom:none; }
  .notice-head {
    display:flex; align-items:center; gap:8px; width:100%;
    padding:16px 4px; background:none; border:none; cursor:pointer; text-align:left;
    font-family:inherit;
  }
  .notice-head:hover .notice-title { color:var(--brass, #B4863F); }
  .notice-pin {
    flex:none; font-size:11px; font-weight:700; color:#fff; background:var(--brass, #B4863F);
    border-radius:4px; padding:2px 6px;
  }
  .notice-title { flex:1; font-size:15px; font-weight:600; color:var(--ink); }
  .notice-date { flex:none; font-size:12px; color:var(--ink-soft); }
  .notice-arrow { flex:none; font-size:12px; color:var(--ink-soft); transition:transform .15s; }
  .notice-item.open .notice-arrow { transform:rotate(180deg); }
  .notice-body {
    display:none; padding:0 4px 18px; font-size:14px; line-height:1.7;
    color:var(--ink); white-space:pre-wrap; word-break:break-word;
  }
  .notice-item.open .notice-body { display:block; }
  .notice-empty { text-align:center; padding:48px 12px; color:var(--ink-soft); }
</style>

<script>
  function escapeHtml(v){
    return String(v ?? "").replace(/[&<>"']/g, c => (
      {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]
    ));
  }

  function renderEmpty(){
    return `
      <div class="notice-empty">
        <div style="font-size:40px; margin-bottom:12px;">📭</div>
        <div style="font-size:15px; font-weight:600; color:var(--ink);">등록된 공지사항이 없습니다.</div>
        <div style="font-size:13px; margin-top:8px;">새로운 소식이 등록되면 이곳에서 안내해 드립니다.</div>
      </div>`;
  }

  function noticeItemHtml(n){
    const pin = n.is_pinned ? `<span class="notice-pin">고정</span>` : "";
    return `
      <div class="notice-item">
        <button class="notice-head" type="button">
          ${pin}
          <span class="notice-title">${escapeHtml(n.title)}</span>
          <span class="notice-date">${escapeHtml(n.created_at || "")}</span>
          <span class="notice-arrow">▾</span>
        </button>
        <div class="notice-body">${escapeHtml(n.body)}</div>
      </div>`;
  }

  async function loadNotices(){
    const wrap = document.getElementById("noticeList");
    let data;
    try {
      const res = await fetch("/api/notices?size=100");
      if (!res.ok) throw new Error("fetch failed");
      data = await res.json();
    } catch (e) {
      wrap.innerHTML = `<div class="notice-empty">공지사항을 불러오지 못했습니다. 잠시 후 다시 시도해주세요.</div>`;
      return;
    }
    const items = (data && data.items) || [];
    if (!items.length){
      wrap.innerHTML = renderEmpty();
      return;
    }
    wrap.innerHTML = items.map(noticeItemHtml).join("");
    wrap.querySelectorAll(".notice-head").forEach((btn) => {
      btn.addEventListener("click", () => {
        btn.parentElement.classList.toggle("open");
      });
    });
  }

  loadNotices();
</script>
<script>window.PAGE_TITLE = "공지사항";</script>
<script src="/static/js/header.js"></script>
<script src="/static/js/auth.js"></script>

</body>
</html>
