<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>숙박시설 실거래가 . 홈앤스테이</title>
<meta name="description" content="숙박시설 실거래 상세 — 건물 정보 및 최근 실거래 추세." />
<link rel="icon" href="/static/img/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css" />
</head>
<body>

<header>
  <a class="brand" href="/" title="홈으로 (전체 보기)" style="cursor:pointer; text-decoration:none;">
    <img class="brand-mark-img" src="/static/home_stay_logo.png" alt="HOME &amp; STAY">
    <div class="brand-text">
      <div class="name">홈앤스테이</div>
    </div>
  </a>
  <div class="page-title">건물 상세</div>
  <div class="header-right"><a href="/" style="color:var(--brass-dark); text-decoration:none; font-weight:600;">← 지도로 돌아가기</a></div>
</header>

<div class="search-panel" style="max-width:840px; margin-bottom:40px;">

  <!-- 상단 안내문구 -->
  <div style="font-size:12px; color:var(--ink-soft); background:var(--brass-tint); border:1px solid #EAD9B8; border-radius:8px; padding:9px 12px; margin-bottom:14px;">
    현재 매매 실거래 기준이며, 전세/월세 데이터는 추후 추가 예정입니다.
  </div>

  <!-- 헤더 카드: 건물 정보 -->
  <div class="panel-card" id="headerCard">
    <div style="font-size:13px; color:var(--ink-soft); padding:6px 0;">불러오는 중…</div>
  </div>

  <!-- 실거래추세 카드 -->
  <div class="panel-card" style="margin-top:14px;">
    <div class="side-card-title">실거래추세 <span class="side-sub">최근 12개월</span></div>
    <div class="side-chart-wrap" style="height:240px;"><canvas id="trendChart"></canvas></div>
    <div class="side-legend">
      <span><i class="lg-bar"></i>거래건수</span>
      <span><i class="lg-line"></i>거래금액(억)</span>
    </div>
    <div id="trendEmpty" class="side-empty" style="display:none;">최근 12개월 실거래 내역이 없습니다.</div>
  </div>

  <!-- 실거래목록 -->
  <div class="panel-card" style="margin-top:14px;">
    <div class="side-card-title">실거래목록 <span class="side-sub" id="txTotalLabel"></span></div>
    <div id="txTableWrap" style="overflow-x:auto;">
      <div class="side-empty">불러오는 중…</div>
    </div>
    <div id="txPager" style="display:none; align-items:center; justify-content:center; gap:14px; margin-top:12px;">
      <button id="txPrev" class="side-more" style="width:auto; padding:6px 16px; margin-top:0;">← 이전</button>
      <span id="txPageInfo" style="font-size:12px; color:var(--ink-soft); font-family:'JetBrains Mono',monospace;"></span>
      <button id="txNext" class="side-more" style="width:auto; padding:6px 16px; margin-top:0;">다음 →</button>
    </div>
  </div>

  <!-- 전속중개사 -->
  <div class="panel-card" style="margin-top:14px;">
    <div class="side-card-title">담당중개사</div>
    <div id="agentBox"><div class="side-empty">불러오는 중…</div></div>
  </div>

  <!-- 위탁운영·하우스키핑 CTA -->
  <div class="panel-card" style="margin-top:14px; border-left:4px solid #639922;">
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <div style="font-size:26px; line-height:1;">🧹</div>
      <div style="flex:1; min-width:200px;">
        <div style="font-size:14px; font-weight:700; color:var(--ink); margin-bottom:3px;">위탁운영·하우스키핑 지원업체를 찾고 있습니다</div>
        <div style="font-size:12px; color:var(--ink-soft);">이 건물의 운영·객실관리를 맡아줄 파트너를 모집합니다.</div>
      </div>
      <button class="side-more" style="width:auto; margin-top:0; padding:8px 16px; background:#EEF6E6; color:#4A7A18; border-color:#CFE4B8;">지원업체로 등록하기</button>
    </div>
  </div>

  <!-- 금융 CTA -->
  <div class="panel-card" style="margin-top:14px; margin-bottom:40px; border-left:4px solid var(--brass);">
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <div style="font-size:26px; line-height:1;">💰</div>
      <div style="flex:1; min-width:200px;">
        <div style="font-size:14px; font-weight:700; color:var(--ink); margin-bottom:3px;">대출상담사를 찾고 계신가요?</div>
        <div style="font-size:12px; color:var(--ink-soft);">매입·잔금 대출 상담을 도와드릴 전문가를 연결해 드립니다.</div>
      </div>
      <button class="side-more" style="width:auto; margin-top:0; padding:8px 16px;">대출상담 문의하기</button>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
  // 지도 마커와 동일한 용도 색상(main.js LODGING_COLORS와 일치)
  const LODGING_COLORS = { "생활": "#378ADD", "호텔": "#7F77DD", "콘도": "#639922" };
  const DEFAULT_MARKER_COLOR = "#9AA5B1";
  const LODGING_BADGE = { "생활": "생숙", "호텔": "호텔", "콘도": "콘도" };
  function markerColor(v){ if(!v) return DEFAULT_MARKER_COLOR; return LODGING_COLORS[v.split("·")[0]] || DEFAULT_MARKER_COLOR; }
  function badgeLabel(v){ if(!v) return "미분류"; return v.split("·").map(x => LODGING_BADGE[x] || x).join("·"); }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

  const buildingId = Number(location.pathname.split("/").pop());
  const headerCard = document.getElementById("headerCard");

  function stat(label, value){
    return `<div style="flex:1; min-width:110px;">
      <div style="font-size:11.5px; color:var(--ink-soft); font-weight:600; margin-bottom:3px;">${label}</div>
      <div style="font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; color:var(--ink);">${value}</div>
    </div>`;
  }

  async function loadBuilding(){
    let b;
    try {
      const res = await fetch("/api/building/" + buildingId);
      if (!res.ok) throw new Error(res.status);
      b = await res.json();
    } catch(e){
      headerCard.innerHTML = `<div class="side-empty">건물 정보를 불러오지 못했습니다.</div>`;
      return;
    }
    const color = markerColor(b.lodging_type);
    const badge = `<span style="display:inline-block; font-size:11px; font-weight:700; color:#fff; background:${color}; padding:3px 10px; border-radius:6px; vertical-align:middle;">${esc(badgeLabel(b.lodging_type))}</span>`;
    const units = b.units != null ? Number(b.units).toLocaleString('ko-KR') + "실" : "-";
    const bizUnits = b.biz_units != null ? Number(b.biz_units).toLocaleString('ko-KR') + "실" : "-";

    headerCard.innerHTML = `
      <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:6px;">
        <h1 style="font-size:20px; font-weight:700; color:var(--ink); margin:0;">${esc(b.building_name || "(건물명 미확인)")}</h1>
        ${badge}
      </div>
      <div style="font-size:13px; color:var(--ink-soft); margin-bottom:4px;">${esc(b.road_address || "주소 미확인")}</div>
      ${b.lodging_type_detail ? `<div style="font-size:11.5px; color:var(--ink-soft); margin-bottom:16px;">${esc(b.lodging_type_detail)}</div>` : `<div style="margin-bottom:16px;"></div>`}
      <div style="display:flex; gap:16px; flex-wrap:wrap; border-top:1px solid var(--line); padding-top:14px;">
        ${stat("총 호실", units)}
        ${stat("영업신고 호수", bizUnits)}
      </div>`;

    renderAgent(b.agent);
  }

  function renderAgent(agent){
    const box = document.getElementById("agentBox");
    if (agent){
      box.innerHTML = `
        <div style="display:flex; align-items:center; gap:14px; flex-wrap:wrap;">
          <div style="width:44px; height:44px; border-radius:50%; background:var(--brass-tint); color:var(--brass-dark); display:flex; align-items:center; justify-content:center; font-size:20px;">🏢</div>
          <div style="flex:1; min-width:180px;">
            <div style="font-size:15px; font-weight:700; color:var(--ink);">${esc(agent.office_name || "-")}</div>
            <div style="font-size:12.5px; color:var(--ink-soft); margin-top:2px;">대표 ${esc(agent.owner_name || "-")}</div>
          </div>
          ${agent.phone ? `<a href="tel:${esc(agent.phone)}" class="side-more" style="width:auto; margin-top:0; padding:8px 16px; text-decoration:none; text-align:center;">📞 ${esc(agent.phone)}</a>` : ""}
        </div>
        ${agent.subdomain_slug ? `<div style="margin-top:10px; text-align:right;"><a href="/agent/${encodeURIComponent(agent.subdomain_slug)}" style="font-size:12.5px; font-weight:600; color:var(--brass-dark); text-decoration:none;">프로필 보기 →</a></div>` : ""}`;
    } else {
      box.innerHTML = `
        <div style="text-align:center; padding:18px 12px; background:var(--brass-tint); border:1px dashed #EAD9B8; border-radius:8px;">
          <div style="font-size:26px; margin-bottom:6px;">🔎</div>
          <div style="font-size:13.5px; font-weight:700; color:var(--ink); margin-bottom:4px;">이 건물의 전속 중개사를 찾고 있습니다</div>
          <div style="font-size:12px; color:var(--ink-soft); margin-bottom:12px;">이 건물을 전담할 중개사무소를 모집합니다.</div>
          <button class="side-more" style="width:auto; margin-top:0; padding:8px 18px;">중개사 회원 신청</button>
        </div>`;
    }
  }

  async function loadTrendChart(){
    const canvas = document.getElementById("trendChart");
    if (!canvas || typeof Chart === "undefined") return;
    let items = [];
    try {
      const res = await fetch("/api/monthly-trend?building_id=" + buildingId);
      const data = await res.json();
      items = data.items || [];
    } catch(e){ console.error("[상세] 추세 로드 실패:", e); return; }

    if (!items.length || items.every(i => !i.count)){
      canvas.style.display = "none";
      document.getElementById("trendEmpty").style.display = "block";
      return;
    }

    // 메인 페이지 좌측 패널(main.js loadTrendChart)과 동일한 Chart.js 설정을 재사용
    const labels = items.map(i => i.ym.slice(2).replace("-", "/")); // 25/08
    const counts = items.map(i => i.count);
    const sums = items.map(i => Math.round((i.sum_price || 0) / 10000)); // 만원 → 억원

    new Chart(canvas, {
      data: {
        labels,
        datasets: [
          { type:"bar", label:"거래건수", data:counts, yAxisID:"y",
            backgroundColor:"#B4863F", borderRadius:3, order:2 },
          { type:"line", label:"거래금액(억)", data:sums, yAxisID:"y1",
            borderColor:"#378ADD", backgroundColor:"#378ADD", borderWidth:2,
            pointRadius:2, tension:.3, order:1 },
        ],
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        interaction:{ mode:"index", intersect:false },
        plugins:{
          legend:{ display:false },
          tooltip:{ callbacks:{ label:(c)=> c.dataset.type === "line"
            ? ` 거래금액 ${c.parsed.y.toLocaleString('ko-KR')}억`
            : ` 거래건수 ${c.parsed.y.toLocaleString('ko-KR')}건` } },
        },
        scales:{
          x:{ grid:{ display:false }, ticks:{ font:{ size:9 } } },
          y:{ position:"left", beginAtZero:true, ticks:{ font:{ size:9 }, precision:0 }, grid:{ color:"#EEF1F3" } },
          y1:{ position:"right", beginAtZero:true, ticks:{ font:{ size:9 } }, grid:{ display:false } },
        },
      },
    });
  }

  // 실거래목록 (board 테이블과 동일 컬럼/스타일 재사용, 페이지네이션 포함)
  const TX_SIZE = 10;
  let txPage = 1, txTotal = 0;

  function txAddr(t){
    return [t.si_do, t.sgg_nm, t.umd_nm, t.jibun].filter(Boolean).map(esc).join(" ");
  }
  function dealTypeTag(v){
    return v === "직거래"
      ? `<span class="tag brk">직거래</span>`
      : `<span class="tag med">중개거래</span>`;
  }

  async function loadTx(){
    const wrap = document.getElementById("txTableWrap");
    const pager = document.getElementById("txPager");
    wrap.innerHTML = `<div class="side-empty">불러오는 중…</div>`;
    let data;
    try {
      const res = await fetch(`/api/transactions?building_id=${buildingId}&page=${txPage}&size=${TX_SIZE}`);
      data = await res.json();
    } catch(e){
      wrap.innerHTML = `<div class="side-empty">실거래 목록을 불러오지 못했습니다.</div>`;
      return;
    }
    const items = data.items || [];
    txTotal = data.total || 0;
    document.getElementById("txTotalLabel").textContent = txTotal ? `총 ${txTotal.toLocaleString('ko-KR')}건` : "";

    if (!items.length){
      wrap.innerHTML = `<div class="side-empty">실거래 이력이 없습니다.</div>`;
      pager.style.display = "none";
      return;
    }

    const rows = items.map(t => `
      <tr>
        <td class="col-name">${t.building_name != null ? esc(t.building_name) : "(건물명 미확인)"}</td>
        <td class="col-addr">${txAddr(t)}</td>
        <td class="col-num col-area">${t.area != null ? Number(t.area).toFixed(1) + " ㎡" : "-"}</td>
        <td class="col-num col-floor">${t.floor ? esc(t.floor) + "층" : "-"}</td>
        <td class="col-price">${t.price != null ? Number(t.price).toLocaleString('ko-KR') : "-"}</td>
        <td class="col-date">${esc(t.deal_date || "-")}</td>
        <td class="col-type">${dealTypeTag(t.deal_type)}</td>
      </tr>`).join("");

    wrap.innerHTML = `
      <table class="data-table">
        <thead><tr><th>건물명</th><th>주소</th><th>면적</th><th>층</th><th>거래금액 (만원)</th><th>계약일</th><th>거래유형</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;

    const lastPage = Math.max(Math.ceil(txTotal / TX_SIZE), 1);
    document.getElementById("txPageInfo").textContent = `${txPage} / ${lastPage}`;
    document.getElementById("txPrev").disabled = (txPage <= 1);
    document.getElementById("txNext").disabled = (txPage >= lastPage);
    pager.style.display = "flex";
  }

  document.getElementById("txPrev").addEventListener("click", () => {
    if (txPage > 1){ txPage--; loadTx(); }
  });
  document.getElementById("txNext").addEventListener("click", () => {
    if (txPage < Math.ceil(txTotal / TX_SIZE)){ txPage++; loadTx(); }
  });

  loadBuilding();
  loadTrendChart();
  loadTx();
</script>
</body>
</html>
