<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>운영업체 등록신청 — 홈앤스테이</title>
<meta name="description" content="홈앤스테이 운영업체 등록신청. 위탁운영·청소·세탁·용품·대출상담·인테리어 협력업체 모집." />
<link rel="icon" href="/static/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png" />
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css" />
</head>
<body>

<header id="siteHeader"></header>

<div class="search-panel" style="max-width:640px; padding-bottom:40px;">

  <div style="margin:16px 0 6px;">
    <a href="/" style="font-size:13px; color:var(--ink-soft); text-decoration:none;">← 홈으로</a>
  </div>

  <div class="panel-card">
    <h1 style="font-size:20px; font-weight:700; color:var(--ink); margin:0 0 6px;">운영업체 등록신청</h1>
    <p style="font-size:13px; color:var(--ink-soft); margin:0 0 16px;">위탁운영·청소·세탁·용품·대출상담·인테리어 협력업체를 모집합니다. 아래 정보를 입력해주세요.</p>

    <div style="background:var(--brass-tint); border:1px solid #EAD9B8; border-radius:8px; padding:12px 14px; margin-bottom:20px;">
      <div style="font-size:13px; font-weight:700; color:var(--brass-dark); margin-bottom:4px;">📎 서류 제출 안내</div>
      <div style="font-size:12.5px; color:var(--ink); line-height:1.55;">명함·영업허가증(업종별 조건부) 사본을 아래에서 바로 첨부할 수 있습니다. (PDF·JPG·PNG, 파일당 5MB 이하)</div>
    </div>

    <div id="buildingNotice" style="display:none; font-size:13px; color:var(--ink); background:var(--brass-tint); border:1px solid #EAD9B8; border-radius:8px; padding:10px 12px; margin-bottom:14px;"></div>

    <form id="applyForm" autocomplete="off">
      <div class="field" style="margin-bottom:14px;">
        <label>업체명 <span style="color:var(--brick);">*</span></label>
        <input type="text" id="office_or_company_name" placeholder="예) 홈앤스테이위탁운영" />
      </div>
      <div class="field" style="margin-bottom:14px;">
        <label>대표자 <span style="color:var(--brick);">*</span></label>
        <input type="text" id="owner_name" placeholder="예) 홍길동" />
      </div>
      <div class="field" style="margin-bottom:14px;">
        <label>업종 <span style="color:var(--brick);">*</span></label>
        <select id="category">
          <option value="">선택해주세요</option>
          <option value="위탁운영">위탁운영</option>
          <option value="청소">청소</option>
          <option value="세탁">세탁</option>
          <option value="용품">용품</option>
          <option value="대출상담사">대출상담사</option>
          <option value="인테리어">인테리어</option>
        </select>
      </div>
      <div class="field" style="margin-bottom:14px;">
        <label>사업자등록번호</label>
        <input type="text" id="biz_reg_number" placeholder="예) 123-45-67890" />
      </div>
      <div class="field" style="margin-bottom:14px;">
        <label>연락처 <span style="color:var(--brick);">*</span></label>
        <input type="text" id="phone" placeholder="예) 010-1234-5678" />
      </div>
      <div class="field" style="margin-bottom:14px;">
        <label>이메일 <span style="color:var(--brick);">*</span></label>
        <input type="text" id="email" placeholder="예) operator@example.com" />
      </div>
      <div class="field" style="margin-bottom:14px;">
        <label>웹사이트 (선택)</label>
        <input type="text" id="website_url" placeholder="예) https://example.com" />
      </div>
      <div class="field" style="margin-bottom:20px;">
        <label>희망지역 (선택)</label>
        <select id="preferred_region">
          <option value="">선택 안 함</option>
        </select>
      </div>

      <div style="border-top:1px solid var(--line); padding-top:16px; margin-bottom:20px;">
        <div style="font-size:13.5px; font-weight:700; color:var(--ink); margin-bottom:10px;">📎 서류 첨부 (선택 · PDF/JPG/PNG, 5MB 이하)</div>
        <div class="field" style="margin-bottom:12px;">
          <label>명함</label>
          <input type="file" class="doc-input" data-doc-type="business_card" accept=".pdf,.jpg,.jpeg,.png" />
          <div class="doc-status" style="display:none; font-size:12px; margin-top:5px;"></div>
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>영업허가증 (업종별 조건부 — 없으면 비워두셔도 됩니다)</label>
          <input type="file" class="doc-input" data-doc-type="biz_license" accept=".pdf,.jpg,.jpeg,.png" />
          <div class="doc-status" style="display:none; font-size:12px; margin-top:5px;"></div>
        </div>
      </div>

      <div id="formError" style="display:none; font-size:13px; color:var(--brick); background:var(--brick-tint); border:1px solid #F0CFCB; border-radius:8px; padding:10px 12px; margin-bottom:14px;"></div>

      <button type="submit" class="btn-search" id="submitBtn" style="width:100%; padding:12px;">신청하기</button>
    </form>

    <div id="successBox" style="display:none; text-align:center; padding:24px 12px;">
      <div style="font-size:40px; margin-bottom:12px;">✅</div>
      <div style="font-size:16px; font-weight:700; color:var(--ink); margin-bottom:8px;">신청이 접수되었습니다.</div>
      <div style="font-size:13.5px; color:var(--ink-soft); line-height:1.6;">검토 후 담당자가 연락드리겠습니다.</div>
      <a href="/" class="side-more" style="display:inline-block; width:auto; margin-top:20px; padding:9px 24px; text-decoration:none;">← 홈으로</a>
    </div>
  </div>
</div>

<script>
  const SIDO_LIST = ["서울특별시","부산광역시","대구광역시","인천광역시","광주광역시","대전광역시","울산광역시","세종특별자치시","경기도","강원특별자치도","충청북도","충청남도","전북특별자치도","전라남도","경상북도","경상남도","제주특별자치도"];
  const regionSel = document.getElementById("preferred_region");
  SIDO_LIST.forEach(s => {
    const o = document.createElement("option");
    o.value = s; o.textContent = s;
    regionSel.appendChild(o);
  });

  // B화면 위탁운영/하우스키핑 카드에서 ?building_id=&building_name= 으로 진입한 경우 안내 문구 표시
  // (agent 신청 링크와 동일 패턴 — 실제 업종(category) 선택은 이 폼 안에서 함)
  (function(){
    const params = new URLSearchParams(location.search);
    const bName = (params.get("building_name") || "").trim();
    if (bName) {
      const box = document.getElementById("buildingNotice");
      box.textContent = `🏢 「${bName}」 건물에서 신청하셨습니다. 아래에서 업종을 선택해 신청을 완료해주세요.`;
      box.style.display = "block";
    }
  })();

  const form = document.getElementById("applyForm");
  const errBox = document.getElementById("formError");
  const submitBtn = document.getElementById("submitBtn");

  // 서류 업로드: 파일 선택 즉시 업로드 API로 올리고, 반환된 참조 키를 보관했다가
  // 신청 제출 시 doc_*_url 필드로 함께 전송한다.
  const DOC_FIELD_MAP = { business_card: "doc_business_card_url", biz_license: "doc_biz_license_url" };
  const docRefs = {};
  document.querySelectorAll(".doc-input").forEach((input) => {
    const statusEl = input.parentElement.querySelector(".doc-status");
    input.addEventListener("change", async () => {
      const file = input.files && input.files[0];
      const docType = input.dataset.docType;
      delete docRefs[docType];
      if (!file){ statusEl.style.display = "none"; return; }
      if (file.size > 5 * 1024 * 1024){
        statusEl.textContent = "파일 크기는 5MB 이하여야 합니다.";
        statusEl.style.color = "var(--brick)";
        statusEl.style.display = "block";
        input.value = "";
        return;
      }
      statusEl.textContent = "업로드 중…";
      statusEl.style.color = "var(--ink-soft)";
      statusEl.style.display = "block";
      try {
        const fd = new FormData();
        fd.append("file", file);
        fd.append("doc_type", docType);
        const res = await fetch("/api/apply/operator/upload", { method: "POST", body: fd });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error((data && data.message) || "업로드 실패");
        docRefs[docType] = data.doc_ref;
        statusEl.textContent = "✅ 첨부 완료: " + file.name;
        statusEl.style.color = "var(--brass-dark)";
      } catch(err){
        statusEl.textContent = "❌ " + (err.message || "업로드에 실패했습니다. 다시 시도해주세요.");
        statusEl.style.color = "var(--brick)";
        input.value = "";
      }
    });
  });

  function showError(msg){
    errBox.textContent = msg;
    errBox.style.display = "block";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errBox.style.display = "none";

    const payload = {
      office_or_company_name: document.getElementById("office_or_company_name").value.trim(),
      owner_name: document.getElementById("owner_name").value.trim(),
      category: document.getElementById("category").value,
      biz_reg_number: document.getElementById("biz_reg_number").value.trim(),
      phone: document.getElementById("phone").value.trim(),
      email: document.getElementById("email").value.trim(),
      website_url: document.getElementById("website_url").value.trim(),
      preferred_region: document.getElementById("preferred_region").value,
    };
    Object.keys(DOC_FIELD_MAP).forEach((docType) => {
      if (docRefs[docType]) payload[DOC_FIELD_MAP[docType]] = docRefs[docType];
    });

    submitBtn.disabled = true;
    submitBtn.textContent = "접수 중…";

    let data;
    try {
      const res = await fetch("/api/apply/operator", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      data = await res.json();
      if (!res.ok || !data.ok){
        showError((data && data.message) || "신청 접수에 실패했습니다. 잠시 후 다시 시도해주세요.");
        submitBtn.disabled = false;
        submitBtn.textContent = "신청하기";
        return;
      }
    } catch(err){
      showError("네트워크 오류로 신청에 실패했습니다. 잠시 후 다시 시도해주세요.");
      submitBtn.disabled = false;
      submitBtn.textContent = "신청하기";
      return;
    }

    form.style.display = "none";
    document.getElementById("successBox").style.display = "block";
  });
</script>
<script>window.PAGE_TITLE = "운영업체 등록신청";</script>
<script src="/static/js/header.js"></script>
<script src="/static/js/auth.js"></script>
</body>
</html>
