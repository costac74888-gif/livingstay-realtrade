<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>숙박시설 실거래가 . 홈앤스테이</title>
<link rel="icon" href="/static/img/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css" />
</head>
<body>

<header>
  <a class="brand" href="/" title="홈으로" style="cursor:pointer; text-decoration:none;">
    <img class="brand-mark-img" src="/static/home_stay_logo.png" alt="HOME &amp; STAY">
    <div class="brand-text"><div class="name">홈앤스테이</div></div>
  </a>
  <div class="page-title">운영지원업체 대시보드</div>
  <div class="header-right"><button id="btnLogout" class="side-more" style="width:auto; margin-top:0; padding:7px 16px;">로그아웃</button></div>
</header>

<div class="search-panel" style="max-width:720px; padding-bottom:40px;">

  <!-- 상단: 내 정보 -->
  <div class="panel-card" style="margin-top:16px;">
    <div style="display:flex; align-items:center; gap:14px; flex-wrap:wrap;">
      <div style="flex:1; min-width:200px;">
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
          <div id="meCompany" style="font-size:18px; font-weight:700; color:var(--ink);">불러오는 중…</div>
          <span id="meCategory" style="display:none; font-size:11.5px; font-weight:700; color:var(--brass-dark); background:var(--brass-tint); padding:3px 10px; border-radius:6px;"></span>
        </div>
        <div id="meOwner" style="font-size:13px; color:var(--ink-soft); margin-top:3px;"></div>
      </div>
      <a id="lnkProfile" href="#" target="_blank" rel="noopener" style="font-size:12.5px; font-weight:600; color:var(--brass-dark); text-decoration:none;">내 프로필 보기 →</a>
    </div>
    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; align-items:center;">
      <button id="btnEditProfile" class="side-more" style="width:auto; margin-top:0; padding:8px 16px;">프로필 수정</button>
      <button id="btnChangePw" class="side-more" style="width:auto; margin-top:0; padding:8px 16px;">비밀번호 변경</button>
      <button id="btnToggleVisible" class="side-more" style="width:auto; margin-top:0; padding:8px 16px;">…</button>
      <span id="visBadge" style="display:none; font-size:11.5px; font-weight:700; padding:3px 10px; border-radius:12px;"></span>
    </div>
  </div>

  <!-- 담당단지 -->
  <div class="panel-card" style="margin-top:14px;">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:4px;">
      <div class="side-card-title" style="margin-bottom:0;">담당 단지 <span class="side-sub" id="bldCount"></span></div>
      <button id="btnAddBld" class="side-more" style="width:auto; margin-top:0; padding:7px 14px;">+ 단지 추가</button>
    </div>
    <div id="bldList"><div class="side-empty">불러오는 중…</div></div>
  </div>

</div>

<!-- 프로필 수정 모달 -->
<div class="admin-modal-overlay" id="mProfile" hidden>
  <div class="admin-modal">
    <div class="admin-modal-head"><h3>프로필 수정</h3><button class="admin-modal-close" data-close="mProfile">×</button></div>
    <div class="admin-modal-body">
      <div class="field"><label>전화번호</label><input type="text" id="fPhone" placeholder="예) 010-1234-5678" /></div>
      <div class="field"><label>사진 URL (http(s)://…)</label><input type="text" id="fPhoto" placeholder="예) https://example.com/photo.jpg" /></div>
      <div class="field"><label>소개글</label><textarea id="fIntro" rows="5" style="width:100%; font:inherit; font-size:13px; padding:9px 10px; border:1px solid var(--line); border-radius:8px; resize:vertical;"></textarea></div>
    </div>
    <div class="admin-modal-msg" id="msgProfile"></div>
    <div class="admin-modal-foot">
      <button class="side-more" style="width:auto; margin-top:0; padding:8px 16px;" data-close="mProfile">취소</button>
      <button class="side-more" style="width:auto; margin-top:0; padding:8px 18px; background:var(--brass); color:#fff; border-color:var(--brass);" id="btnSaveProfile">저장</button>
    </div>
  </div>
</div>

<!-- 비밀번호 변경 모달 -->
<div class="admin-modal-overlay" id="mPw" hidden>
  <div class="admin-modal">
    <div class="admin-modal-head"><h3>비밀번호 변경</h3><button class="admin-modal-close" data-close="mPw">×</button></div>
    <div class="admin-modal-body">
      <div class="field"><label>현재 비밀번호</label><input type="password" id="fPwCur" autocomplete="current-password" /></div>
      <div class="field"><label>새 비밀번호 (8자 이상)</label><input type="password" id="fPwNew" autocomplete="new-password" /></div>
      <div class="field"><label>새 비밀번호 확인</label><input type="password" id="fPwNew2" autocomplete="new-password" /></div>
    </div>
    <div class="admin-modal-msg" id="msgPw"></div>
    <div class="admin-modal-foot">
      <button class="side-more" style="width:auto; margin-top:0; padding:8px 16px;" data-close="mPw">취소</button>
      <button class="side-more" style="width:auto; margin-top:0; padding:8px 18px; background:var(--brass); color:#fff; border-color:var(--brass);" id="btnSavePw">변경</button>
    </div>
  </div>
</div>

<!-- 메모 수정 모달 -->
<div class="admin-modal-overlay" id="mNote" hidden>
  <div class="admin-modal">
    <div class="admin-modal-head"><h3 id="noteTitle">메모 수정</h3><button class="admin-modal-close" data-close="mNote">×</button></div>
    <div class="admin-modal-body">
      <div class="field"><label>메모 (예: 담당 구역, 계약 범위 — 비워두면 삭제)</label><textarea id="fNote" rows="4" style="width:100%; font:inherit; font-size:13px; padding:9px 10px; border:1px solid var(--line); border-radius:8px; resize:vertical;"></textarea></div>
    </div>
    <div class="admin-modal-msg" id="msgNote"></div>
    <div class="admin-modal-foot">
      <button class="side-more" style="width:auto; margin-top:0; padding:8px 16px;" data-close="mNote">취소</button>
      <button class="side-more" style="width:auto; margin-top:0; padding:8px 18px; background:var(--brass); color:#fff; border-color:var(--brass);" id="btnSaveNote">저장</button>
    </div>
  </div>
</div>

<!-- 단지 추가 모달 -->
<div class="admin-modal-overlay" id="mAdd" hidden>
  <div class="admin-modal">
    <div class="admin-modal-head"><h3>단지 추가</h3><button class="admin-modal-close" data-close="mAdd">×</button></div>
    <div class="admin-modal-body">
      <div class="field"><label>건물명 검색 (2자 이상)</label><input type="text" id="fSearch" placeholder="예) 오션스위트" autocomplete="off" /></div>
      <div id="searchResults" style="max-height:280px; overflow-y:auto;"></div>
    </div>
    <div class="admin-modal-msg" id="msgAdd"></div>
    <div class="admin-modal-foot">
      <button class="side-more" style="width:auto; margin-top:0; padding:8px 16px;" data-close="mAdd">닫기</button>
    </div>
  </div>
</div>

<script src="/static/js/format_util.js"></script>
<script>
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
const LODGING_COLORS = { "생활": "#378ADD", "호텔": "#7F77DD", "콘도": "#639922" };
const LODGING_BADGE = { "생활": "생숙", "호텔": "호텔", "콘도": "콘도" };
function markerColor(v){ if(!v) return "#9AA5B1"; return LODGING_COLORS[v.split("·")[0]] || "#9AA5B1"; }
function badgeLabel(v){ if(!v) return "미분류"; return v.split("·").map(x => LODGING_BADGE[x] || x).join("·"); }

let ME = null;

function openModal(id){ document.getElementById(id).hidden = false; }
function closeModal(id){ document.getElementById(id).hidden = true; }
document.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", () => closeModal(b.dataset.close)));
document.querySelectorAll(".admin-modal-overlay").forEach(ov => ov.addEventListener("click", e => { if (e.target === ov) ov.hidden = true; }));

async function api(url, opts){
  const res = await fetch(url, Object.assign({ headers: { "Content-Type": "application/json" } }, opts));
  if (res.status === 401){ location.href = "/operator/login"; throw new Error("unauthenticated"); }
  const data = await res.json().catch(() => ({}));
  return { ok: res.ok, data };
}

function renderVisibility(){
  const on = ME.is_visible !== false;
  const btn = document.getElementById("btnToggleVisible");
  const badge = document.getElementById("visBadge");
  btn.textContent = on ? "노출중지" : "노출 재개";
  badge.style.display = "inline-block";
  if (on){ badge.textContent = "노출중"; badge.style.background = "#E4F5EA"; badge.style.color = "#1E7C43"; }
  else { badge.textContent = "노출중지됨"; badge.style.background = "#FBEAEA"; badge.style.color = "#B23A3A"; }
}

function render(){
  renderVisibility();
  document.getElementById("meCompany").textContent = ME.company_name || "-";
  const cat = document.getElementById("meCategory");
  if (ME.category){ cat.textContent = ME.category; cat.style.display = "inline-block"; }
  else cat.style.display = "none";
  document.getElementById("meOwner").textContent = "대표 " + (ME.owner_name || "-");
  const lnk = document.getElementById("lnkProfile");
  if (ME.subdomain_slug){ lnk.href = "/operator/" + encodeURIComponent(ME.subdomain_slug); lnk.style.display = ""; }
  else lnk.style.display = "none";

  const list = document.getElementById("bldList");
  document.getElementById("bldCount").textContent = (ME.buildings || []).length + "개";
  if (!(ME.buildings || []).length){
    list.innerHTML = `<div class="side-empty">등록된 담당 단지가 없습니다. 위의 [+ 단지 추가] 버튼으로 등록해보세요.</div>`;
    return;
  }
  list.innerHTML = ME.buildings.map(b => `
    <div style="padding:13px 2px; border-bottom:1px solid #F0EBDF;">
      <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
        <a href="/building/${b.master_building_id}" target="_blank" rel="noopener" style="font-size:14.5px; font-weight:700; color:var(--ink); text-decoration:none;">${esc(b.building_name || "-")}</a>
        <span style="display:inline-block; font-size:10.5px; font-weight:700; color:#fff; background:${markerColor(b.lodging_type)}; padding:2px 8px; border-radius:5px;">${esc(badgeLabel(b.lodging_type))}</span>
        <span style="flex:1;"></span>
        <button class="side-more" style="width:auto; margin-top:0; padding:5px 12px; font-size:12px;" onclick="openNote(${b.master_building_id})">메모 수정</button>
        <button class="side-more" style="width:auto; margin-top:0; padding:5px 12px; font-size:12px; color:var(--brick);" onclick="delBuilding(${b.master_building_id})">삭제</button>
      </div>
      ${(b.note || "").trim() ? `<div style="font-size:12px; color:var(--ink-soft); margin-top:6px;">📝 ${esc(b.note)}</div>` : ""}
    </div>`).join("");
}

async function load(){
  const { ok, data } = await api("/api/operator/me");
  if (!ok){ document.getElementById("meCompany").textContent = "정보를 불러오지 못했습니다."; return; }
  ME = data;
  render();
}

// ---- 노출중지/재개 토글 ----
document.getElementById("btnToggleVisible").addEventListener("click", async () => {
  const next = !(ME.is_visible !== false);
  if (!next && !confirm("노출을 중지하면 신규 매물의뢰/리드가 더 이상 배정되지 않습니다. 계속하시겠습니까?")) return;
  const { ok, data } = await api("/api/operator/visibility", { method: "PUT", body: JSON.stringify({ is_visible: next }) });
  if (!ok){ alert(data.message || "변경에 실패했습니다."); return; }
  ME.is_visible = data.is_visible;
  renderVisibility();
});

// ---- 프로필 수정 ----
document.getElementById("btnEditProfile").addEventListener("click", () => {
  document.getElementById("fPhone").value = formatPhone(ME.phone || "");
  document.getElementById("fPhoto").value = ME.photo_url || "";
  document.getElementById("fIntro").value = ME.intro_text || "";
  document.getElementById("msgProfile").textContent = "";
  openModal("mProfile");
});
document.getElementById("btnSaveProfile").addEventListener("click", async () => {
  const body = {
    phone: document.getElementById("fPhone").value,
    photo_url: document.getElementById("fPhoto").value,
    intro_text: document.getElementById("fIntro").value,
  };
  const { ok, data } = await api("/api/operator/me", { method: "PUT", body: JSON.stringify(body) });
  if (!ok){ document.getElementById("msgProfile").textContent = data.message || "저장에 실패했습니다."; return; }
  closeModal("mProfile");
  await load();
});

// ---- 비밀번호 변경 ----
document.getElementById("btnChangePw").addEventListener("click", () => {
  ["fPwCur","fPwNew","fPwNew2"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("msgPw").textContent = "";
  openModal("mPw");
});
document.getElementById("btnSavePw").addEventListener("click", async () => {
  const cur = document.getElementById("fPwCur").value;
  const nw = document.getElementById("fPwNew").value;
  const nw2 = document.getElementById("fPwNew2").value;
  const msg = document.getElementById("msgPw");
  if (nw.length < 8){ msg.textContent = "새 비밀번호는 8자 이상이어야 합니다."; return; }
  if (nw !== nw2){ msg.textContent = "새 비밀번호가 서로 일치하지 않습니다."; return; }
  const { ok, data } = await api("/api/operator/password", { method: "PUT", body: JSON.stringify({ current_password: cur, new_password: nw }) });
  if (!ok){ msg.textContent = data.message || "변경에 실패했습니다."; return; }
  closeModal("mPw");
  alert("비밀번호가 변경되었습니다.");
});

// ---- 메모 수정 ----
let noteTarget = null;
window.openNote = function(mbid){
  const b = (ME.buildings || []).find(x => x.master_building_id === mbid);
  if (!b) return;
  noteTarget = mbid;
  document.getElementById("noteTitle").textContent = `메모 수정 — ${b.building_name || ""}`;
  document.getElementById("fNote").value = b.note || "";
  document.getElementById("msgNote").textContent = "";
  openModal("mNote");
};
document.getElementById("btnSaveNote").addEventListener("click", async () => {
  const msg = document.getElementById("msgNote");
  const note = document.getElementById("fNote").value;
  const { ok, data } = await api(`/api/operator/buildings/${noteTarget}/note`, { method: "PUT", body: JSON.stringify({ note }) });
  if (!ok){ msg.textContent = data.message || "저장에 실패했습니다."; return; }
  closeModal("mNote");
  await load();
});

// ---- 단지 삭제 ----
window.delBuilding = async function(mbid){
  const b = (ME.buildings || []).find(x => x.master_building_id === mbid);
  if (!confirm(`'${(b && b.building_name) || "이 단지"}'를 담당 단지에서 삭제할까요?`)) return;
  const { ok, data } = await api(`/api/operator/buildings/${mbid}`, { method: "DELETE" });
  if (!ok){ alert(data.message || "삭제에 실패했습니다."); return; }
  await load();
};

// ---- 단지 추가 ----
document.getElementById("btnAddBld").addEventListener("click", () => {
  document.getElementById("fSearch").value = "";
  document.getElementById("searchResults").innerHTML = "";
  document.getElementById("msgAdd").textContent = "";
  openModal("mAdd");
  document.getElementById("fSearch").focus();
});
let searchTimer = null;
document.getElementById("fSearch").addEventListener("input", () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 300);
});
async function doSearch(){
  const q = document.getElementById("fSearch").value.trim();
  const box = document.getElementById("searchResults");
  if (q.length < 2){ box.innerHTML = ""; return; }
  const { ok, data } = await api("/api/operator/buildings/search?q=" + encodeURIComponent(q));
  if (!ok){ box.innerHTML = `<div class="side-empty">검색에 실패했습니다.</div>`; return; }
  const items = data.items || [];
  if (!items.length){ box.innerHTML = `<div class="side-empty">검색 결과가 없습니다.</div>`; return; }
  box.innerHTML = items.map(it => `
    <div style="display:flex; align-items:center; gap:8px; padding:9px 4px; border-bottom:1px solid #F0EBDF;">
      <span style="display:inline-block; font-size:10px; font-weight:700; color:#fff; background:${markerColor(it.lodging_type)}; padding:2px 7px; border-radius:5px;">${esc(badgeLabel(it.lodging_type))}</span>
      <div style="flex:1; min-width:0;">
        <div style="font-size:13.5px; font-weight:600; color:var(--ink);">${esc(it.building_name)}</div>
        <div style="font-size:11.5px; color:var(--ink-soft);">${esc([it.sgg_text, it.umd_nm].filter(Boolean).join(" "))}</div>
      </div>
      ${it.already_added
        ? `<span style="font-size:11.5px; color:var(--ink-soft);">이미 등록됨</span>`
        : `<button class="side-more" style="width:auto; margin-top:0; padding:5px 12px; font-size:12px;" onclick="addBuilding(${it.id})">추가</button>`}
    </div>`).join("");
}
window.addBuilding = async function(mbid){
  const msg = document.getElementById("msgAdd");
  const { ok, data } = await api("/api/operator/buildings", { method: "POST", body: JSON.stringify({ master_building_id: mbid }) });
  if (!ok){ msg.textContent = data.message || "추가에 실패했습니다."; return; }
  msg.textContent = "";
  await load();
  await doSearch(); // "이미 등록됨" 상태 갱신
};

// ---- 로그아웃 ----
document.getElementById("btnLogout").addEventListener("click", async () => {
  try { await fetch("/api/operator/logout", { method: "POST" }); } catch(e){}
  location.href = "/operator/login";
});

load();
</script>
  <script src="/static/js/pw_toggle.js"></script>
</body>
</html>
