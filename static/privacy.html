<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>개인정보처리방침 — 홈앤스테이 (HOME &amp; STAY)</title>
<style>
  :root{ --brass:#B4863F; --brass-dark:#8A6526; --ink:#16202E; --ink-soft:#5B6672; --line:#E7E3DA; --bg:#F7F5F1; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink);
        font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
        line-height:1.75; -webkit-font-smoothing:antialiased; }
  .legal-header{ background:var(--ink); color:#fff; padding:22px 20px; }
  .legal-header-inner{ max-width:820px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .legal-brand{ font-size:13px; font-weight:700; letter-spacing:.16em; color:var(--brass); }
  .legal-home{ font-size:13px; color:#D7DCE2; text-decoration:none; }
  .legal-home:hover{ color:#fff; }
  .legal-wrap{ max-width:820px; margin:0 auto; padding:40px 20px 80px; }
  .legal-title{ font-size:26px; font-weight:800; margin:0 0 6px; }
  .legal-updated{ font-size:12.5px; color:var(--ink-soft); margin:0 0 30px; }
  .legal-body h2{ font-size:16px; font-weight:700; margin:32px 0 10px; padding-top:18px; border-top:1px solid var(--line); }
  .legal-body h2:first-of-type{ border-top:none; padding-top:0; }
  .legal-body p, .legal-body li{ font-size:14px; color:#2C3744; }
  .legal-body ul, .legal-body ol{ padding-left:20px; }
  .legal-placeholder{ background:#FFF8EC; border:1px dashed #E4CB98; border-radius:10px;
        padding:18px 20px; font-size:13.5px; color:var(--brass-dark); }
</style>
</head>
<body>
  <header class="legal-header">
    <div class="legal-header-inner">
      <span class="legal-brand">HOME &amp; STAY</span>
      <a class="legal-home" href="/">← 홈으로</a>
    </div>
  </header>
  <main class="legal-wrap">
    <h1 class="legal-title">개인정보처리방침</h1>
    <p class="legal-updated">제이앤제이프로퍼티 주식회사</p>
    <div class="legal-body">
      <div class="legal-placeholder">
        개인정보처리방침 본문은 준비 중입니다. (원본 페이지 연결 후 반영 예정)
      </div>
    </div>
  </main>
</body>
</html>
