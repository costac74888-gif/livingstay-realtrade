<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>숙박시설 실거래가 &amp; 위탁운영 플랫폼 . 홈앤스테이</title>
<link rel="icon" href="/static/img/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<style>
  :root{ --brass:#B4863F; --brass-dark:#8A6526; --ink:#16202E; --ink-soft:#5B6672; --line:#E7E3DA; --bg:#F7F5F1; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink);
        font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
        line-height:1.75; -webkit-font-smoothing:antialiased; }
  .legal-header{ background:#fff; color:var(--ink); padding:22px 20px; border-bottom:1px solid var(--line); }
  .legal-header-inner{ max-width:820px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .legal-brand{ font-size:13px; font-weight:700; letter-spacing:.16em; color:var(--ink); }
  .legal-home{ font-size:13px; color:var(--ink-soft); text-decoration:none; }
  .legal-home:hover{ color:var(--ink); }
  .legal-wrap{ max-width:820px; margin:0 auto; padding:40px 20px 80px; }
  .legal-title{ font-size:26px; font-weight:800; margin:0 0 6px; }
  .legal-updated{ font-size:12.5px; color:var(--ink-soft); margin:0 0 30px; }
  .legal-body h2{ font-size:16px; font-weight:700; margin:32px 0 10px; padding-top:18px; border-top:1px solid var(--line); }
  .legal-body h2:first-of-type{ border-top:none; padding-top:0; }
  .legal-body p, .legal-body li{ font-size:14px; color:#2C3744; }
  .legal-body ul, .legal-body ol{ padding-left:20px; }
  .legal-body table{ width:100%; border-collapse:collapse; font-size:13.5px; margin:10px 0; }
  .legal-body th, .legal-body td{ border:1px solid var(--line); padding:8px 12px; text-align:left; }
  .legal-body th{ background:#F1EDE4; font-weight:700; }
  .legal-placeholder{ background:#FFF8EC; border:1px dashed #E4CB98; border-radius:10px;
        padding:18px 20px; font-size:13.5px; color:var(--brass-dark); }
</style>
</head>
<body>
  <header class="legal-header">
    <div class="legal-header-inner">
      <span class="legal-brand">HOME &amp; STAY</span>
      <a class="legal-home" href="/">← 홈으로</a>
    </div>
  </header>
  <main class="legal-wrap">
    <h1 class="legal-title">개인정보처리방침</h1>
    <p class="legal-updated" id="legalUpdated">빌드리머스 · 대표 조혜성</p>
    <div class="legal-body" id="legalBody">
      <div class="legal-placeholder">개인정보처리방침 본문을 불러오는 중입니다…</div>
    </div>
  </main>
  <script>
    // 본문은 DB(legal_documents)에서 공개 API로 로드한다. 관리자가 admin.html에서
    // 수정·저장하면 별도 배포 없이 이 페이지에 즉시 반영된다.
    fetch("/api/legal/privacy")
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var body = document.getElementById("legalBody");
        if (d && d.ok && d.content) {
          body.innerHTML = d.content;
          if (d.updated_at) {
            document.getElementById("legalUpdated").textContent =
              "빌드리머스 · 대표 조혜성 · 최종 개정일 " + d.updated_at;
          }
        } else {
          body.innerHTML = '<div class="legal-placeholder">본문을 불러오지 못했습니다. 잠시 후 다시 시도해주세요.</div>';
        }
      })
      .catch(function () {
        document.getElementById("legalBody").innerHTML =
          '<div class="legal-placeholder">본문을 불러오지 못했습니다. 잠시 후 다시 시도해주세요.</div>';
      });
  </script>
</body>
</html>
