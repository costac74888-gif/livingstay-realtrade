<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>전체 대출상담사 · 홈앤스테이</title>
<meta name="description" content="홈앤스테이 등록 대출상담사 전체 목록. 금융감독원 등록 대출모집인 — 생활숙박시설 담보대출 등 무료 상담." />
<link rel="icon" href="/static/img/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css" />
<style>
.lc-card{ border:1px solid var(--line); border-radius:12px; padding:14px; background:#fff; margin-bottom:10px; }
.lc-tags{ display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
.lc-tag{ font-size:11px; padding:2px 8px; border-radius:10px; background:#F1F3F6; color:var(--ink-soft); font-weight:600; }
.lc-tag.hot{ background:var(--brass-tint); color:var(--brass-dark); }
.lc-badge{ display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; color:#1E5FA8; background:#EAF2FB; padding:3px 9px; border-radius:10px; }
</style>
</head>
<body>

<header id="siteHeader"></header>

<div class="search-panel" style="max-width:640px; padding-bottom:48px;">
  <div style="margin:16px 0 6px;">
    <a href="/" class="home-link" style="font-size:13px; color:var(--ink-soft); text-decoration:none;">← 홈으로</a>
  </div>

  <div class="panel-card" style="margin-bottom:14px;">
    <h1 style="font-size:19px; font-weight:700; color:var(--ink); margin:0 0 6px;">전체 대출상담사</h1>
    <p style="font-size:13px; color:var(--ink-soft); margin:0; line-height:1.6;">
      홈앤스테이에 등록된 금융감독원 등록 대출모집인 목록입니다.<br>
      <strong>모든 상담은 무료이며, 상담 시 수수료를 요구하는 것은 불법입니다.</strong>
    </p>
  </div>

  <div id="lcList">
    <div class="panel-card" style="text-align:center; color:var(--ink-soft); font-size:13px;">불러오는 중…</div>
  </div>
</div>

<script src="/static/js/format_util.js"></script>
<script src="/static/js/header.js"></script>
<script src="/static/js/auth.js"></script>
<script>
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

async function loadList(){
  const box = document.getElementById("lcList");
  let items = [];
  try {
    const res = await fetch("/api/loan-consultants/all");
    const d = await res.json();
    if (res.ok && d.ok && Array.isArray(d.items)) items = d.items;
  } catch(e){}
  if (!items.length){
    box.innerHTML = `<div class="panel-card" style="text-align:center; color:var(--ink-soft); font-size:13px;">등록된 대출상담사가 아직 없습니다.</div>`;
    return;
  }
  box.innerHTML = items.map(c => {
    const products = String(c.consultant_products || "").split(",").map(s => s.trim()).filter(Boolean);
    return `
    <div class="lc-card">
      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <div style="width:44px; height:44px; border-radius:50%; background:var(--brass-tint); color:var(--brass-dark); display:flex; align-items:center; justify-content:center; font-size:20px;">💰</div>
        <div style="flex:1; min-width:140px;">
          <div style="font-size:15px; font-weight:700; color:var(--ink);">${esc(c.owner_name || "-")} 대출상담사</div>
          <div style="font-size:12.5px; color:var(--ink-soft); margin-top:2px;">${esc(c.office_name || "-")}</div>
        </div>
        ${c.phone ? `<a href="tel:${esc(c.phone)}" class="side-more" style="width:auto; margin-top:0; padding:8px 15px; text-decoration:none; text-align:center;">📞 ${esc(window.formatPhone ? formatPhone(c.phone) : c.phone)}</a>` : ""}
      </div>
      ${c.license_number ? `<div style="margin-top:8px;"><span class="lc-badge">✓ 금융감독원 등록 대출모집인 (등록번호: ${esc(c.license_number)})</span></div>` : ""}
      ${c.intro_text ? `<div style="font-size:12.5px; color:var(--ink-soft); margin-top:7px;">${esc(c.intro_text)}</div>` : ""}
      ${products.length ? `<div class="lc-tags">${products.map(p => `<span class="lc-tag${p === "생활숙박시설 담보대출" ? " hot" : ""}">${esc(p)}</span>`).join("")}</div>` : ""}
      ${c.kakao_chat_url ? `<div style="margin-top:9px;"><a href="${esc(c.kakao_chat_url)}" target="_blank" rel="noopener noreferrer" style="display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:#3C1E1E; background:#FEE500; padding:7px 14px; border-radius:8px; text-decoration:none;">💬 카카오톡 상담하기</a></div>` : ""}
    </div>`;
  }).join("") + `
    <div style="font-size:11.5px; color:var(--ink-soft); margin-top:6px; text-align:center;">모든 상담은 무료이며, 상담 시 수수료를 요구하는 것은 불법입니다.</div>`;
}
loadList();
</script>
</body>
</html>
